front:
  text: 曹家達序鄉先正姜天敘先生肆力於醫慨念漢醫放失斐然興著述之志綜其生平所著有四大證論若干卷書中所論風癆臌膈旁徵博引參以己意至為詳審曩者豫於同鄉仲佩紳所設九如堂藥肆遇仲之外舅陳某出以相示因得窺其全豹厥後中醫學會刊布雜志門人王一仁見而悅之因逐期刊布雜志中易其名曰風癆臌膈論從其實也厥後其裔孫文駿寓書中醫學會略謂家藏舊本不知何緣遺失在外冀得原稿以保存先世手澤姜氏固多賢子孫哉然當時以刊布未完欲歸趙而不果嗣因姜君達夫之請向中醫學會取原稿而下卷業已遺失幸一仁所刊雜志並來書刊入卷尾略無訛脫一仁信有功於姜氏矣今者達夫擬用單行本行世索序於豫爰為略舉顛末辨簡端以歸之庚午年八月邑後學曹家達謹序瞿簡莊序嗚呼吾華市北鎮向以醫名世至今衰墜不振者久矣余髫年授庭訓即從事於內經難經金匱玉函諸書訓以知之者為知行之者為行寧使知之而未能行莫使行之而未能知不為垂垂衰老僅得略窺其皮毛何曾咀拾其精髓吾友蘇墅橋吳乃良先生曰姜體乾與葉天士同時行醫體乾遊蘇適居天士比鄰凡有就葉診棄之者輒為之治一日見墜淚咨嗟者曰勢將奈何急詢其故知天士斷其木葉落時定難飛渡體乾即為之診曰病固急矣勉為處方不特璧其診資並助以藥資囑服十劑果驗天士聞而駭曰是誰能挽回斡旋歟因知我華市有姜體乾公之醫道天士先生特來華市謁姜公並謙曰昔日有眼不識泰山今特來請出山體乾下榻曰余處窮鄉貧病者多不能出乃款留而去繇是知學無底止而醫學更無底止體乾之風類都如此而其乃祖天敘先生之醫學弘博有非時下所能望其項背者今其裔孫正從持天敘所著風勞臌膈四大證論稿囑為校正據曹孝廉家達得之於仲九如望曹公詳序之正從深恐先人之心血手澤湮沒他日付棗梨吾知姜氏將來有繼興者焉承淡安序醫學之在於我國皆曰今不如古實則指庸人而言者庸者皆不學無術之人也使其學而窮究古今之病源精審古今之方略其病之在標在本病之或傳或變方之宜補宜瀉不執不拘則可如古人云三年蓄艾能治之於未病之先與夫一七回生能治之於已病之後故曰讀書而不能醫者有之決未有不讀書而能醫者也風癆臌膈症之大者也諺云風癆臌膈實病難醫實病乃邪實正虛之謂經云清靜則肉腠閉拒雖有大風苛毒弗之能害不獨四大證如是何病不然耶要之能詳察病源精審其證方以制宜四大證有何畏哉吾故鄉姜公天敘特著風勞臌膈論以闡明古聖先哲立論制方之精微蓋聞姜公者好讀書善醫術常立功過格日記得失終身不怠探析性命之微雅抱痌瘝之痛而以好學不倦之旨牗人以博施濟衆之術讀其論中類多闡揚經旨如中風一症其力主非外風所中抉奧發微分疏清晰如對虛癆一症其旨當從難經治法融合越人之脈法於仲景辨證之中論治虛損本於難經及丹溪子和諸家學說理精辭約非數十年之學力曷克臻此哉再讀其臌脹釋義與治膈之方都有獨特之見地又附雜病論治有非四證所能限者博引各家學說參以己意極為詳確其諄諄告誡後學之心如大海明燈淡安與鄉先輩天敘公後裔文駿君忝為葭莩之誼據其敘述姜氏家藏著作本豐輾轉遷徙又遭兵燹盡付劫灰久耳四大證全書之名以是未獲卒讀為憾茲蒙惠我中醫雜志所載風勞臌膈論全篇得以拜讀全書值此發揚祖國醫學文化遺産一則提供海內同道之參考一則對姜公畢生心血之巨著庶不致湮沒而不彰爰為之序時在公元一九五六年六月上浣承淡安謹序姜文駿序今夏檢校舊帙將祖傳醫書數百冊特為之分篋珍藏免與諸書間雜也中有一小冊偶爾披閲見書首有四大證全書江陰姜禮天敘氏輯孫健曾孫大鏞參訂字樣並有邑諸名宿傳題閲竟不勝驚喜以為吾先祖著作至今日而始發現焉惜僅存十數頁末由窺見全豹亦憾事也猶憶余童年時嘗聞先祖詠仙公云吾家祖遺醫書不下數百種著作滿室富有五車同治初太平軍解放江城時潰軍土匪竄擾焚燬殆盡然燼餘尚存數千冊伯祖蘊山蔭喬兩公所得約有千餘冊庚申春故宅毀於火煌煌巨製從此都付諸劫灰嗚呼先人纍世之心血歷年愈久愈湮沒而不彰矣即今所存四大證全書亦屬殘缺不完詢諸伯叔早稔原本失蹤無考惋惜久之詎今秋吾友陶君南鵬肄業上海醫專學校惠贈校出中醫雜志一冊內載有姜天敘著風癆臌膈論卒讀是篇尚待續未竟因念吾先祖之姓名奚為而在此耶得毋姓名有同耶繼而思余因業商不明醫學今日所見之風癆臌膈莫非即所存之四大證全書然乎否乎即將舊稿悉心校對果然一字不易乃知此論實為先祖所著無疑也於是昔日所黯然神傷者今頓欣然色喜矣夫天敘公龍砂姜氏二世祖也生於順治十一年好讀書善醫術立功過格日記得失終身不怠旁及玄功名噪大江南北年七十有一而歿邑志載有仁壽鏡本草搜根行世今已軼家乘中只有四大證全書名目此外邑志家乘所未載而為鄉賢藏匿者則證治匯理一書是也計抄本念余冊今悉藏張少泉先生家疇昔家伯省軒因掌教於南通醫專校曾親謁張公云已什襲珍藏矣他日如能合浦珠還自當刊行以垂諸久遠一九二五年秋九月十一世孫文駿敬識
