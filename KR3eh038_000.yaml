body:
  text: 天敘姜公傳公諱禮字天敘姓姜氏其先浙紹人也父玉田公始居江陰之華墅生公遂世為江陰人公好讀書善醫術常立功過格日記得失終身不怠每遇貧者施診往來徒步出囊中藥治之不取值以故邑中賢士大夫樂與締交蓋非徒重其術並重其德焉華墅在邑東五十里龍砂兩山屏障於後泰清一水襟帶於前其山川之秀代産良醫迄今大江南北延醫者都於華墅而華墅之中又獨推姜氏蓋自公一人開之也韓子云莫為之前雖美弗彰莫為之後雖善勿繼吾於姜氏亦云公於岐黃外旁及玄功所善有瞿道人者發不櫛足不履寒暑一衲行止無定逮卒之歲謂道人曰三月之望吾將逝矣汝當來及期瞿不至諭諸子曰須之三日道人必來是日命沐浴更衣坐道人果至時不能言但手書諷經二字瞿諾之即奄然逝記曰至誠之道可以前知公可謂至誠者矣論曰古云醫不三世不服其藥謂醫者當讀三世之書也余讀姜公所著四大證全書理精詞約非數十年之學力焉能得心應手活人無算乎宜其子孫食報於無窮小道云乎哉嘉慶元年公元一七九六年歲次丙辰孟春之吉長壽孔廣居拜撰中風中風一症有卒僕有暴喑有不遂有歪僻有四肢不舉有神昏冒寐有痰涎壅盛有語言蹇澀有外風襲入者有本氣自病者及乎外有六經形證內見二便閉塞其病各異其名不同而為治之法亦非一也靈樞經云虛邪偏客於身半其入系內居營衛營衛稍衰真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛又云偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病也身無痛者四肢不收志亂不甚其言微知可治甚則不能言不可治也仲景金匱云夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然又云寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚喎僻不遂是則內經金匱所論中風皆主虛邪立說而後代劉河間則主火為訓李東垣則主氣為訓朱丹溪則主濕為訓然則三子者各出心裁亦指證中之所有而言之也至近代諸家則分真中類中強引中氣中暑中濕諸卒僕暴死之證渾同立論而中風一證共欲明之而實晦之矣蓋中風之邪其有無夾雜風火氣濕之來豈可劃然分耶但當以何有何無孰淺孰深以求確然之治斯為當矣夫八風之邪皆名虛邪人身營衛經絡素盛者無從入之入之者因其虛而襲之耳內經以為身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟是則中風之來無不本之陽虛者矣喻嘉言氏論中風曰陽虛邪害空竅為本而風從外入者必挾身中所有之邪或氣或痰或火而為之標以風邪之中人未有不因陽氣不固而入之者也中風之為疾未有不因火因氣因痰而勾引深入者也因虛卒僕不挾外邪者則有之若但云客邪而本不虛者則未之有也中風之邪從外而來以漸深入金匱云邪在於絡肌膚不仁中絡邪氣入衛猶在絡脈之外故但肌膚不仁其曰邪在於經即重不勝中經則於營脈之中內而骨外而肉皆失其所養則軀殼為之重著然猶在軀殼之間至入腑入臟則離軀殼而入內邪中深矣中腑即不識人然中腑必歸於胃以胃為六腑之總司也風入胃中胃熱必盛蒸其津液結為痰涎壅塞隧道胃之支脈絡心者才有壅塞即堵神氣出入之竅故不識人也中臟舌即難言諸臟受邪至盛必逆入於心而亂神明神明無主則舌難言其臟氣素虛而陽氣不治者卒然倒僕矣此論外中邪以漸深入東垣亦分中腑中臟中血脈之治中腑者其病在表多著四肢中臟者其病在裡多滯九竅中血脈者外無六經之證內無二便之閉但口眼喎斜半身不遂中腑外見六經形證用續命湯加減治之小續命湯治中風不省人事漸覺半身不遂口眼歪斜手足戰掉語言謇澀肢體麻痹精神昏亂頭目眩昏痰火併多筋脈拘急不能屈伸骨節煩痛不得轉側諸風服之皆驗防風桂心黃芩杏仁去皮尖炒芍藥甘草川芎麻黃去節人參各一錢半防己二錢大附子炮七分上藥作二帖水一盞半姜五片棗一枚煎八分服中臟內見二便閉塞則用三化湯通利之三化湯治中風外有六經之形證先以加減續命湯主之內有便溺之阻隔此方主之大黃枳實羌活各等分每服一兩水煎服然解表攻裡之法必體壯證實者設也夫風為陽邪善走空竅若誤攻其表重開洞門出而復入其變愈大而攻裡尤甚以中臟之候多因平素積虛其邪易入臟真不守若誤下之立致危亡不可不慎也惟在胃腑一證內實便閉者間有可下然不過解其煩熱實非大下也然中臟有緩急二候中腑日久熱勢深極傳入臟者此屬可下必使風與熱俱去填其空竅則風不再生若開其瘀壅必反增風熱何以下為哉其卒虛身中急證下藥入口其人即不蘇矣可不辨歟風中五臟其來有自臟氣先傷後乃中之火熱氣濕痰虛六賊勾引深入一旦猝倒無知偏身牽引四末不用但得不死亦成癱瘓察其形證何臟先傷調之使平肺中於風多汗惡風時咳晝瘥暮甚口燥而喘身運而重冒而腫脹肝中於風多汗惡風善悲色蒼嗌乾善怒頭目瞤而脅痛行常傴令人嗜甘心中於風當分二候若翕翕發熱不能食心中飢食即嘔吐此外因也其曰心傷者勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此內因也脾中於風多汗惡風身休怠惰四肢不欲動色薄微黃不嗜食翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣腎中於風多汗惡風面龐然加腫脊痛不能正立隱曲不利其色炲此五臟之見證也審其何臟之證多見按其脈察其色毋草草也中風外證錯見不一風火相煽多上高巔風濕相搏多流四末手足麻木但屬氣虛關節腫痹濕痰流滯喻嘉言云中風之脈各有所兼兼則益造其偏然必顯呈於脈蓋新風挾舊邪或外感或內傷其脈隨之忽變兼寒則脈浮緊兼風則脈浮緩兼熱則脈浮數兼痰則脈浮滑兼氣則脈沉澀兼火則脈盛大兼陽虛則脈微亦大而空兼陰虛則脈數亦細如絲陰陽兩虛則微數或微細虛滑為頭中痛遲緩為營衛衰大抵陽浮而數陰濡而弱浮滑沉滑微虛散數皆為中風然虛浮遲緩正氣不足尚可補救急大數疾邪不受制必死無疑若大數未死急疾猶得不死經言風氣之病似七診而非故有不死可見大數為風氣必有之脈亦未可定為死脈耳天敘云按中風一證醫書冠之篇首其證大矣歷觀古今名家所論不一遂令中風一證茫無著落以至後代諸君分為真僞兩途其意中風必因外中於風方名真中其猝僕偏枯非因外風雖至種種諸證皆為類中及豫考之內經金匱諸篇其論偏枯猝僕諸證未嘗專主於風立說及豫每驗中風之人於未中之先必有先徵或十指麻痹或肌肉蠕動或語言謇澀或肢體不遂或平時脈滑大不和弦緊無根諸多隱微見於一二年前人多不覺直至一時觸發忽焉倒僕其若果為外中風邪何以預為若是也且每見中風之人必中年以後或肥盛之軀豈外風之來必中年肥盛者方感之耶若此則中風之證非特外風所中也明矣經曰僕擊偏枯肥貴人則膏粱之疾也又曰三陰三陽發為偏枯痿易又曰虛邪偏於身中其入深內居營衛營衛稍衰則真氣去邪氣獨留發為偏枯云云其曰膏粱之疾其曰三陰三陽其曰虛邪其曰真氣去邪氣獨留明指是證非獨外中於風是以仲景先師中風論云寸口脈浮而緊緊則為寒浮則為虛虛寒相搏邪在皮膚浮者血虛絡脈空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂其若果為外中於風何其反雲浮者血虛絡脈空虛正氣引邪喎僻不遂等語則其明指此風為虛風之候其不專主於外風立論也東垣河間丹溪三君所論似殊及細詳之而東垣先生則引經曰陽之氣以天地之疾風名之原夫人身中之氣以天地間之風喻之蓋天地間之風其平治之時未見其形變現之時迷塞宇宙而人身中之氣亦然其變其害皆由陽氣不治氣即為邪經云天明則日月不明邪害空竅陽氣閉塞地氣冒明虛風內發之證一如天地間之疾風暴雨迅不及掩故以風之一字命名意可見也所以病中風者每於未中之先必有先徵河間主火東垣主氣丹溪論痰皆各有卓見其所論皆中風門中所必有之事其中氣中暑中寒中惡食厥痰厥其暴病暴死有相類乎中風然皆自是別證與三子所論之證有何干涉耶不得強引中風合論亦不得以類中名之嘉言氏曰河間主火為訓是火召風入火為本風為標矣丹溪主痰為訓是痰召風入痰為本風為標矣然人之一身每多兼三者而有之曷不曰陽虛邪害空竅為本而風從外入者必挾身中所有之邪或火或氣或痰而為之標耶當於風火痰氣之間審其何有何無虛實輕重之際孰緩孰急辨其分寸可也而為之施治斯為上策矣若但於風之一字起見立說其不敗者幾希生生子曰人之一身經絡貫串為之脈脈者血之隧道也血隨氣行周流不停筋者周布四肢百節聯絡而束縛之此屬肝木得血以養之則和柔而不拘急脈皆起於手足指端故十二經皆以手足而名筋則無處無之皮毛者屬肺主外而易於感冒人身之血內行於脈絡外充於皮毛滲透肌肉滋養筋骨故百體和平運動無礙若氣滯則血滯氣逆則血逆得熱則血瘀濁得寒則血凝泣衰耗則順行不周滲透不遍而外邪易侵矣津液者血之餘行乎外流通一身如天之清露若血濁氣滯則凝聚而為痰痰乃津液之變遍身上下無處不到津液生於脾胃水穀所成濁則為痰故痰生於脾土也是以古人論中風偏枯麻木等證以血虛瘀血痰飲為言是論其致病之源至其得病則必有所感觸或因風或因寒或因濕或因酒或因七情或勞役房勞汗出因感風寒濕氣遂成此病此血病痰病為本而外邪為標其邪中於皮毛肌肉則不知痛癢麻木不仁如有物一重貼於其上或如蟲遊行或灑灑寒栗遇熱則或癢遇陰雨則沉重痠痛其邪入於血脈經絡則手足指掌肩背腰膝重硬不遂難於屈伸舉動或走注疼痛此上諸證皆外自皮毛以至筋骨之病凡脈所經所絡筋所會所血氣津液所行之處皆邪氣鬱滯正氣不得流通而致然治者當以養血除風順氣化痰為主不必強度某病屬某經某臟而雜治之也卒僕謂卒然僵仆而不省人事也內經名之瘈凡中氣中暑食厥痰厥皆致猝然僵仆然與中風之候自是相殊而中風卒倒喉多痰聲脈多沉伏或脈隨氣奔指下洪盛者中風之證有少須自蘇者有中而不蘇即死者有蘇而終變不治者無不本之陽虛若陽氣未至十分脫絶者尚可救援若真陽離絶雖有良法無益也若因而挾外邪或痰或火衝犯清陽閉塞竅道亦致倒僕但得真氣漸復亦可自蘇倉卒之際先辨其陽中陰中中於陰者面色或青或白或黑痰喘昏亂眩冒多汗甚者手足厥冷中於陽者面赤唇紅牙關緊咬上視強直掉眩煩渴大率陰中重而陽中輕又必先辨其閉證脫證若牙關緊咬兩手握固即是閉證法宜開關通竅急宜用通關散牙皂細辛生半夏為細末搐鼻有嚏可治無嚏難治口噤不開宜抉或以破根散南星五分冰片少許以中指點末擦牙根一法急用白礬半兩鹽花一分細研揩牙根更以半錢綿裹安牙盡頭或用烏梅肉擦牙隨用薑汁竹瀝麻油化蘇合香丸或用三生飲生南星一兩川附子五錢生川烏五錢木香二錢五分加姜十片煎好灌下挾虛者加人參兩許如熱阻關竅痰盛昏迷者用牛黃清心丸煎滌痰湯南星薑汁炒半夏各二錢枳實一錢茯苓錢半橘紅錢半菖蒲八分人參竹茹各七分甘草五分化下以上為閉證者設若口開心絶手撒脾絶閉證則口噤咬兩拳握固與口開者異眼合肝絶遺尿腎絶聲如鼾睡肺絶此名脫證若五不全見者速宜大劑參附煎濃汁頻灌及灸臍下雖曰不治亦有得生者中風脫證極虛不救者多即用參附亦不過或冀什一若不預為病家道明竟投參劑設使不救多致招謗若不分閉脫妄投蘇合牛黃不救按腦麝牛黃乃辛香竄散之品惟中藏閉證暫借開竅設邪在血脈反誤投之引邪深入如油入面莫之能出至脫絶之證誤投之是速其死也心法云氣虛卒倒用參耆補之肥白人多濕少用烏頭附子行經瘦人陰虛火熱用四物湯加竹瀝牛膝芩柏有痰加痰藥按肥白人多濕用烏附行經然肥白人不特多濕抑多陽虛附子在所必用也痰涎壅甚者宜用吐法稀涎散半夏大者十四枚牙皂一個炙入薑汁煎服不能咽者徐徐灌之此法之輕者其有涎多難散又非小吐不可則用明礬牙皂等分為末白湯調服吐之此吐劑之輕者重者用藜蘆半錢為末加麝香少許齏汁調灌若口噤昏迷者灌入鼻內吐之虛者不可吐其或風多涎少人事不昏者則用蝦半斤入醬蔥姜等物水煮先吃蝦次飲汁後以鵝翎探引吐之痰涎壅甚用橘紅一斤逆流水五碗煎至一二碗傾服白湯導吐之吐痰之聖藥也太白散用陳石灰水飛每服三錢水一碗煎湯溫服下痰如神氣欲絶心頭上溫者喉中微響皆效二陳湯星香散加竹瀝薑汁虛者六君子湯同星香散脈沉伏無熱者三生飲加全蠍一個養正丹可以墜下痰涎若痰熱甚者加石膏麥冬於二陳之內牛黃清心丸乃治中藏痰熱昏冒之藥也以上治痰諸法王宇泰曰卒僕偏枯之症未有不因正氣不周而病故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦有治風之功焉許胤宗治皇太后中風口噤煎二藥熏之而愈其法用黃耆八十斤防風若干煎湯成鍋使其氣周滿一室如熏如霧氣退自醒況服之乎多怒加羚羊角渴加乾葛汁秦艽口噤亦加秦艽恍惚錯語加茯神遠志不得睡加酸棗仁不能言加竹瀝荊瀝梨汁陳醬汁生葛汁人乳汁內熱加梨汁人乳生地黃汁痰多加竹瀝荊瀝少佐薑汁余每治此證用諸汁以收奇功為行經絡滲分肉捷於湯散故也此治氣虛肥白者之法繆仲純曰東南之地素多濕熱之氣質多柔脆往往多熱多痰真陰既虧內熱彌甚煎熬津液凝結為痰壅塞氣道不得通利熱甚生風亦致猝然僵仆或不省人事或語言謇澀小便短赤此其驗也至所用之藥初清熱則天門冬麥門冬甘菊花白芍藥白茯苓栝蔞根童便順氣則紫蘇子枇杷葉橘紅鬱金開痰則貝母白芥子竹瀝荊瀝栝蔞仁次治本益陰則天冬甘菊生地當歸白芍枸杞麥冬五味牛膝人乳白膠香黃柏白蒺藜之屬補陽則人參黃耆鹿茸大棗按仲純此論本於河間丹溪至其所用之藥惟重甘寒一遵內經熱淫所勝治以甘寒之旨陰虛多熱之證則當從此選用也不語華元化云心脾中風則舌強不語蓋脾脈絡胃俠咽連舌本散舌下心之別脈系舌本二臟受風則舌本強硬而不語也資壽解語湯防風羚羊角棗仁炙草天麻附子炮官桂羌活竹瀝薑汁心經熱者兼涼膈散清心心經蘊熱舌謇不語用轉舌膏即涼膈散加菖蒲遠志等分為末蜜丸彈子大硃砂為衣薄荷湯下若痰迷心竅舌強不語當滌痰為先見卒僕門然此證最急此藥似緩當先調化牛黃清心丸審其屬虛者此方調下二丹丸二丹丸治風邪健忘養神定志和血肉定心神外華腠理得睡丹參熟地天冬各一兩五錢硃砂人參菖蒲遠志各五錢茯神麥冬甘草各一兩共研細末蜜丸桐子大每服五十丸至一百丸庶足以開痰通竅也再入竹瀝薑汁更驗若風涎壅塞舌本難轉語不正者正舌散蠍蛸去毒十四個茯苓一兩共為細末食前溫酒下有腎氣厥不至舌下舌喑不能言舌喑者乃舌本喑弱不得言與舌本難者相反王宇泰曰素問云太陰所謂入中謂喑者陽盛已衰故為喑也內奪而厥則為喑痱此腎虛也少陰不至者厥也夫腎者藏精主下焦地道之生育故衝任二脈系焉二脈與少陰腎之大絡同出腎下起於胞中其衝脈因稱胞脈絡為十二經脈之海遂名海焉衝脈之上行者滲諸陽灌諸精下行者滲三陽灌諸絡而溫肌肉別絡結於跗因腎虛而腎絡與胞絡內絶不通於上則喑腎脈不上循喉嚨挾舌本則不能言二絡不通於下則痱厥矣如是者以地黃飲子主之熟地戟肉山茱萸蓯蓉石斛五味炮附子麥冬白茯苓菖蒲遠志肉官桂各等分薄荷葉七片姜五片棗一枚按腎氣厥不至舌下乃真臟之氣不榮於舌耳至其濁陰之氣必橫格於喉舌之間吞咯維艱昏迷特甚又非不有之證可以緩調方中所用附桂巴蓯原為驅逐濁陰而設用方者不可執己見而輕去之也若肝腎虛而涎潮壅塞不語當用三因白散子生附子滑石各五錢半夏七錢半為末每服二錢水煎加姜七片蜜半匙空心服失音不語訶子湯訶子四個桔梗一兩甘草一寸三味俱半生半炒為末每服五錢童便一杯煎服中風不語龜尿少許點舌上神效取龜尿法置龜新荷葉上用豬棕鼻內刺之即出半身不遂即偏枯之證左為癱右為瘓經云男子發左女子發右大率僕擊偏枯證每相連而至為治之初亦先順氣次辨風火痰虛何有何無要當以養正為本而兼以治標之藥若筋骨疼痛舉動不便多則痰火風氣流注經絡又當先以通經活絡之味然後治本可也喻嘉言曰內經云偏枯者不一曰汗出偏沮使人偏枯曰陽盛陰不足曰胃脈大小不一曰心脈小堅結曰腎水虛靈樞亦敘偏枯於熱病篇中皆不言風皆不言虛皆不言其本於何邪豈非以七情飢飽房室凡能虛其臟氣致營衛經脈痹而不通者皆可言邪耶然偏枯病陽盛陰不足者有之而陽氣虛衰痹而不通者亦有之不可不知也王宇泰云內經論偏枯皆主心與胃二臟蓋心是天真神機開發之本胃乃穀氣充大真氣之標標本相得則胸膈間之膻中所留宗氣盈溢分布四臟三焦上中下外無不周遍若標本相失則不能致其氣於氣海而宗氣散矣故分布不周於經脈則偏枯不周於五臟則喑即此言之可為諸言偏枯者綱領也治療之方黃耆為君人參當歸白芍為臣防風桂枝鉤藤竹瀝薑汁韭汁葛汁梨汁乳汁之屬為之佐使苟用烏附羌活之屬以涸營而耗衛如此死者醫殺之也丹溪云大率多痰在左屬血虛與死血在右屬氣虛與痰然亦不可執也蓋人之偏枯如樹木之一邊津液不蔭注則枯槁而葉脫故治偏枯者但當補養血氣急灌其未枯者使已枯者可通氣而復榮昔人之用勻順散白朮二錢天麻五分白芷沉香青皮人參各五分烏藥錢半甘草五分紫蘇木瓜各一錢姜三片煎服亦是取其和勻氣血無偏無忤之意然後進以滋養之藥如和榮湯白朮川芎各錢半南星半夏芍藥茯苓天麻各一錢當歸生熟地牛膝棗仁黃芩橘紅各八分防風官桂各六分紅花甘草各四分黃柏二分入竹瀝薑汁服有補血活血之功不致於滯有健脾燥濕消痰之能不致於燥又清熱運動疏風開經絡通腠理王道之劑多服可以見功周慎齊云雖有左右之分治只一法俱宜十全大撲湯加羌活三四帖後在左用氣中之血藥在右用血中之氣藥大便閉雖十日半月不妨慎無輕導如便閉血藥多於氣藥便泄氣藥多於血藥慎齊方治半身不遂甘菊歸身石斛首烏各一兩五錢牛膝麥冬各二兩五錢蒺藜貝母蘇子黃耆橘紅甘草各四錢天冬一兩白芍一兩八錢地黃三兩作十劑煎服虎脛骨酒治偏枯不遂石斛石楠葉防風炙虎脛骨當歸茵陳葉杜仲牛膝巴戟川斷川芎金毛狗脊各一兩酒一斗浸十日服虎骨散治半身不遂肌肉乾瘦當歸赤芍續斷白芍藁本虎骨烏蛇肉共為細末每服二錢食後溫酒調下史國公浸酒方治風癱不能行功防風萆薢當歸敗龜板鱉甲虎骨川牛膝枸杞秦艽晚蠶砂油松節羌活白茄根蒼耳子酒浸蜜封七日開飲不可面向壇口每服一小杯一日飲二次以上三方皆用酒者取其導引流通之意而河間換骨丹及續命丹皆用腦麝以癱瘓之證因虛而風濕痰火搏結於筋脈之間疼痛者藉此以開通閉結然過於竄散其在陰虛之體若誤投之禍不旋踵其風濕搏結者舒筋安散治左癱右瘓拘急走注疼痛木瓜五兩萆薢五靈脂牛膝酒浸續斷殭蠶炒松節白芍烏藥天麻威靈仙黃耆當歸防風虎骨酒炙各一兩好酒一斗浸藥十四日扎壇口然後取藥焙為末浸酒下每服二錢若風入筋骨而拘急攣拳或麻木疼痛鐵彈丸治癱瘓筋攣麻木疼痛乳香沒藥各一兩川烏炮去皮臍一兩五錢五靈脂酒浸淘去沙石曬乾四兩麝香一錢滴水丸彈子大每服一丸臨臥薄荷酒磨服按偏枯癱瘓諸證有淺深輕重之別即經所云其入深內居營衛其邪氣淺者脈偏痛以此推之其痛者反輕不痛者為重也言不變志不亂者為輕甚則不能言者不可治也故其用藥有顧本以兼標者有治標不重本者因證以詳治也其方中有用參耆為主者重於虛者也有用烏附羌防為主者取其流通經絡蓋痰火風濕瘀滯若非先以雄健之品為之響導莫能開也用酒漬酒下者亦是此意不可因見用風藥奏功認為外風肆行無忌而傷人也智者思之近代繆仲純取用白蒺藜菊花首烏黃耆二冬漆葉牛膝地黃鱉甲竹瀝一派甘寒之味雖無近效而陰虛內熱之人誠可恃也不可因其平淡而忽之王宇泰治藏位宇氣虛痰多脾虛有濕晚年半身不遂人參一斤半夏曲二斤薑汁竹瀝拌炒白朮半斤牛膝一斤天冬一斤用長流水煎膏再入鹿角膠虎骨膠霞天膠各一斤河間梨膠二斤各制膏和勻重湯煮一日夜出火毒每空心臨臥取半杯以竹瀝梨汁人乳桑瀝各一杯和勻重湯燉熱服之便效外治法用蠶砂二石分作三袋蒸熱著患處冷再易以瘥為度內用羊脂入粳米蔥白薑椒煮熟日食一具十日止效桑枝法用桑枝一升炒香以水三大升煎取二升一日服盡圖經云桑枝溫平不涼不熱可以常服療中風體癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身聰耳明目令人顏色光澤兼療口乾仙經云一切仙藥不得桑煎不服河間治何子常病兩臂痛諸藥不效依此作數劑臂痛即愈口喎目斜有中經中絡之別綱目云目斜屬足三陽經足太陽起於目之上足陽明起於目之下足少陽起於目鋭眥口喎屬手足陽明手足陽明經環於口之上下風邪入之則引頰移口而為喎僻也治法亦當先用順氣之劑勻氣散見前次用清陽湯黃耆歸身升麻葛根炙草紅花酒柏桂枝蘇木生甘草酒煎服後以火尉摩急處或秦艽升麻湯升麻葛根炙草芍藥人參各五錢秦艽白芷防風桂枝各三錢每服一兩加蓮鬚蔥白煎取汁服若內因痰火虛風當消痰清火清風仲純法最妙如菊花沙參栝蔞根貝母天麥冬天麻蘇子橘紅白芍元參秦艽連翹是也戴復庵云口眼喎斜先燒皂莢煙燻之以逐去外邪次用乳香烟熏之以順其血脈口眼喎斜固主於陽明而有筋脈之分經云足之陽明手之太陽筋急則口目為僻此為胃之筋病也又云足陽明之脈挾口環唇所生病者口喎唇斜此胃之絡脈病也故筋急喎斜藥之可愈脈急喎斜非灸勿痊目斜灸承泣口喎灸地漿如未效於人迎頰車灸之頰車在頰齒交處又法以筆管五寸插入耳內外以面塞四圍勿使透風頭以艾灸七七右喎灸左左喎灸右一法耳垂下用麥粒大艾灸之灸壯同法外治法用酒煮桂枝汁一升以故布浸搨面上左喎搨右右喎搨左一方用槿樹花搗爛敷之或酒煎服若無花用子無子用殼俱效又方用鱔魚血加麝香塗之以絲絨絆即效四肢不舉皆屬脾土然有虛實之分若膏粱太過積熱內蘊者為脾土實熱宜瀉以開其瘀三化湯之類食少體羸怠惰嗜臥者脾土虛衰宜補以健其運加味六君子湯即六君子湯加竹瀝半小杯麥冬三錢身體疼痛鐵彈丸見前若手足流注疼痛麻痹不仁難以屈伸者苡仁湯苡仁三錢當歸芍藥各一錢二分麻黃五分官桂五分蒼朮米泔水浸銼炒錢半甘草八分生薑七分小便不利潔古云中風不利不可以藥利之既已自汗則津液外亡小便自少若利之使營衛枯竭無以制火煩熱愈甚當自熱退汗止小便自行也不因津液枯竭者用三因白散子加木通燈心茅根煎遺尿濃煎參耆湯少加益智子頻啜之虛勞虛是氣血不足損是五臟虧損勞是火炎於上勞瘵者既虛且損復竭其力而動於火以成其勞也虛而未勞但名不足虛而且勞其成瘵成蒸無不至矣虛有因病致虛者調之可復補之可足易為力也而因病致損者一或失調即成不足損而且勞瘵病繼之夫勞有五臟之勞若曲運神機則心勞而為虛汗怔忡縱情恣欲則腎虛而為骨蒸夢泄形冷悲哀則肺勞而為咳嗽痰喘恣睢善怒則肝勞而為痛痹筋攣動作傷形思慮傷意則脾勞而為少食多痰形羸神倦故勞者必因於虛虛極必至於勞喻嘉言曰虛勞之症金匱敘於血痹之下可見勞則必勞其精血也營血傷則內熱起五心常熱目中生火見花耳內蛙聒蟬鳴口舌糜爛不知五味鼻孔乾燥呼吸不利乃至飲食不為肌膚怠惰嗜臥骨軟足酸營行日遲衛行日疾營血為衛氣所逼不能內守而脫出於外或吐或衄或出二陰之竅血出既多火熱迸入逼迫煎熬漫無休止營血有立盡而已不死何待耶更有勞至之極而血痹不行者血不脫於外而但蓄於內蓄之日久周身血走之隧道悉痹不流惟就乾涸致鮮滑澤肌膚甲錯面無榮潤於是氣之所過血不為動徒蒸為熱或日晡或子午始必乾熱俟蒸氣散微汗而解熱蒸不已瘵病成焉不死又何待耶亦有始因脫血後遂血痹者血虛血少艱於流布發熱致痹尤易易也內經凡有虛病不及於勞獨仲景先師發明虛勞脈症其法其方後人多不能用是未深究其旨也以後諸賢方法雜出千蹊萬徑何反十無一全為工者當師仲景乎抑師後人乎抑寧任其自愈乎不明本末苦寒雜投因藥而死者十之七八無寧待其自愈乎藥之不愈歸咎於無藥非無藥也是醫之無師也無師之智其不殺人者幾希越人分主陰虛陽虛兩端誠虛門中之一大炬也蓋陽虛者氣虛也脾病也土為萬物之母而人之資以為生者也凡人飢飽勞役及大病失調皆能傷脾胃脾胃一傷五臟皆失滋養原氣虛反陷入於陰化而為火以致發熱咳嗽與陰虛勞瘵之症是似不同當用東垣法一以扶陽為主忌用滋陰寒涼之品恐反陷其陽也此即虛損之症是也若陰虛者血虛也腎病也腎為天一之元而人資之以為始者也凡人勞心好色傷其精血以致水虧火旺火亢則爍肺消陰為咳為蒸與陽氣不足之症兩相各別當壯水養陰為主忌用辛溫燥熱之品恐反損其陰也此即勞瘵之症也然陽虛之極者陰亦虛終以陽虛為本陰虛之極者陽亦虛終以陰虛為本又陰陽兩虛之症又當較量於彼此之間須陰陽兩無虧損至陰陽兩虛之極者先天之原陰亦虛命門之真火衰敗則又當以溫補命門回陽固本為主而補火一著又不可不講也大抵勞症之初多始於心腎不交然五臟呈皆有勞心腎為多心主血腎主精精竭血燥心腎虛矣腎氣虛則水走於下心氣缺則火炎於上水火不交則虛勞之症成矣火炎上則為痰為嗽為煩熱為口乾為咯血為上氣為嘔吐為盜汗為耳鳴目眩為夢中驚悸水走下則為腰痛為腳弱為泄瀉為赤白濁為遺精夢泄為小便滑數為皮毛焦枯皆虛勞變症生於心腎者也故當補心養腎以交水火水火交則五臟之陰不傷而虛勞之症愈矣治勞三本辨東垣丹溪立齊論綺石公曰肺為五臟之天脾為百骸之母水為萬物之源治肺治脾治腎治勞之道畢矣夫東垣一生千言萬語止透發得一篇脾胃論便為四大家之首丹溪一生千言萬語止明滋陰補腎一著便為治勞之宗以至薛立齊究明補火一著謂太陽一照陰火自彌斯三先生者皆振古之高人能回一時之習尚闢歧黃之心傳者然皆主於一偏而不獲全體之用如清任和三聖各造其極而終非孔子大成之集也是以脾胃之論出於東垣者無弊若後人執東垣以治虛勞者未免以燥劑補土有拂於肅清肺金滋陰之說出自丹溪者業已有弊若後人執丹溪以治虛勞者蓋全以苦寒降火濡冷保肺有礙於中州之土化至於陰常不足陽常有餘此實一偏之見難為古人諱者而後人沿習成風偏重苦寒凡遇虛火虛熱陰虛陽亢之症動輒以黃柏補腎知母清金未能補腎家之真水而反制腎家之真火夫腎者坎象也一陽陷於二陰之間此二陰者真水也一陽者真火也真水次第而生肝木肝木又上生心火真火次第而上生脾士脾士又上生肺金故人生之本從下而起如天地之法象如羲皇之畫卦故腎之為臟合水火二氣以為用為五臟六腑之根源真水不可滅也真火獨可熄乎然救此者又執立齊補火之說著左歸右歸丸皆不離乎桂附而不顧其人之有鬱火無鬱火有鬱熱無鬱熱更不顧其人曾經傷肺不曾傷肺夫虛火可補理則宜然如古方補中益氣參耆朮草之甘溫以除大熱而終不聞以辛熱之劑抱薪救火者也惟綺石先生執兩端以用中合三部以平調其清金保肺無礙中州之土此其用丹溪法而不死於丹溪也其曰培土調中不損至高之氣此其用東垣法而不死於東垣也其曰金行清化不覺水自流長乃合金水於一致也其曰三臟既治何慮木火乘時乃統五臟以同歸也但主脾主腎在先賢頗多發明而清金保肺一著尚未有透發其精微者故先生於肺論治獨詳此治勞之三本不可不重也出虛勞祕旨趙養葵相火龍雷論曰火有人火有相火人火者燎原之火也相火者龍火也雷火也得濕則𤋲遇水則燔不知其性而以水折之以濕攻之適足以光燭天物窮方止矣知其性者以火逐之焰灼自消災光撲滅古書瀉火之法意蓋如此今夫率以黃柏治相火殊不知此相火者寄於肝腎之間此乃水中之火龍雷之火也若用黃柏苦寒之藥又有水滅濕伏龍雷之火愈發矣龍雷之火當濃陰驟雨之時火焰愈熾或燒燬房屋或擊碎木石其勢誠不可抗惟太陽一照火自消滅此得水則熾得火則滅之一驗也又龍雷至五六月而啓發九十月而歸藏蓋冬時陽氣在下尤雷就其火氣而居於下夏時陰氣在下龍雷不能安其身而出於上明於此義故惟八味丸桂附與相火同氣直入腎中據其窟宅而招之同氣相求此即水就濕火就燥之意安得不引之歸源耶人非此火不能有生世人皆曰降火余獨以地黃滋養水中之火世人皆曰滅火而余獨以桂附溫補天真之火千載不明之論余獨發明之陰虛發熱論曰世間發熱類傷寒者數種治各不同此論外感者也今人一見發熱皆作傷寒率用汗藥以發其表汗後不解又用表藥以涼其肌虛症若是豈不殆哉自東垣出而發內傷補中益氣之論此用氣藥以補氣之不足者也至於勞心好色內傷真陰真陰既傷則陽無所附故亦發熱其人必面赤躁煩口渴引飲骨痛脈數而大或尺脈數而無力者是也惟丹溪發明補陰之說以四物湯加黃柏知母此用血藥以補血之不足者也世襲相因屢用不效何耶蓋因陰字認得不真誤以血為陰耳當作腎中之真陰即先天也內經曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也王太僕先生注曰大寒而盛熱之不熱是無火也大熱而盛寒之不寒是無水也又云倏忽往來時發時止是無火也晝見夜伏夜見晝止時節而動是無水也當求其屬而主之無火者宜益火之源以消陰翳無水者宜壯水之主以制陽光必須六味八味二丸出入增減以補真陰屢用屢效若泥知柏苦寒之說必致損傷脾陰而斃者不可勝舉大抵病熱作渴飲食便閉此屬實熱人皆知之或惡寒發熱引衣蜷臥四肢厥冷大便清利其屬真寒人亦易知至於煩擾狂越不欲近衣欲坐臥泥水井中此屬假熱之症其甚者煩極發躁渴飲不絶舌如芒刺兩唇燥裂面赤如塗朱色如嬌嫩身如焚燎足心如烙吐痰如湧喘急大便閉結小便淋瀝三部脈洪大而無倫當是時也惟宜加減八味丸料一斤內肉桂一兩以水頓煎五六碗冰冷與飲諸症自退翌日必惡寒脈脫是無火也當補其陽急以八味丸料煎服自愈此症與脈俱變其常而不以常法治之者也若産後及大失血後陰虛血暴傷必大發熱亦名陰虛發熱此陰字正是血氣之陰若以涼藥正治立斃即四物湯亦不可用急宜用獨參湯或當歸補血湯使無形生出有形來此陽生陰長之妙也蓋陰虛發熱面必赤色無根之火載於上也若是陽虛火入於內面必不赤其口渴者腎水乾枯引水自救也但口雖渴而舌必滑脈雖數而尺必無力甚者尺雖洪大按之必不鼓此為辨耳雖然若其人曾服過涼藥脈亦有力而鼓指矣蓋服涼藥而脈反加數者火鬱也宜升宜補切忌寒涼犯之必死臨症之工更宜詳辨出趙氏醫貫虛火伏火論諸火可補火諸熱不可補火又諸臟有虛火可補火肺臟有伏火不可補火此先哲未發之旨也何謂諸火可補火火者虛火也假象也謂動於氣而未著於形其見於症也易升易降倏有倏無其發也盡有燎原之勢或面赤頰紅或眩暈厥冒種種不同而皆可以溫潤補腎之劑以取其浮越而引歸於性根命蒂之中也何謂諸熱不可補火熱者實熱也其雲實熱者為其熱著於形無變遷升降故云實熱非實熱之火可寒可降可汗可下之熱此非實熱也謂其先動於氣久而漸著於形如燒熱之物相似其見於症也有定時有定處無升降無變遷其夜間准熱日間不熱者為夜熱其內里恆熱而皮膚未熱者為內熱其蒸熱之深如在骨髓蒸出而徹於皮膚者為骨蒸勞熱此種種蒸熱有清法無溫法若以有定之實熱同無定之虛火混一而治喪無日矣何謂諸臟有虛火可補火肺臟有伏火不可補火蓋肺之與四臟又有差別如肝腎龍雷之火可引而伏脾胃寒格之火可補而越心家虛動之火可補而定惟肺金伏熱之火不可補之蓋五行生剋惟金畏火惟火爍金故清肅之臟所畏惟火此以臟質而言之也肺居膈上其氣清其位高若火上衝則治節失令而痰滯氣塞咳嗽交加故至高之部所畏惟火此以部位言之也若偶然浮越之火亦不犯此禁獨是伏熱之火出於陰虛陽亢火乘金位謂之賊邪以其火在肺葉之下故名伏火以其火只星星便能使金令扞格故名逆凡若此症痰必膠固吸短呼長脈必細而數細為血虛數為火勝此在少年勞症之根虛勞脈至細數則不可治此云勞症之根是約言也斷宜清法無用溫理若以肺家伏火同四臟之火混一同治害不容言矣出綺石公虛勞祕旨虛勞之症乃火病也若不先明諸火之源臨症時從何下手耶故余不厭碎煩匯合諸賢之說可為治勞之一助云爾精氣奪則虛論人稟沖和之氣而生身有三曰元精元神元氣者本身中之真精真氣真脈也夫精乃五臟之真非營血之比五臟皆主藏精而腎不過為都會關司之所今人言精專主腎治是不知五臟藏精之說故曰天癸氣乃五臟之大經為靜靜之主故曰神機脈乃真委和之一氣經乃言有三曰命之本氣神形之道其機運升降皆隨之而動因血而營精氣資始相生不失以養一身為人之司命形質之體用也至若精不足則氣失資化氣不足則血失所營血不足則氣無所附天真散亂則精神氣無稟命矣是以相生長養之道精化氣氣生神皆稟乎身之臟腑之真也夫氣血從乎營衛營衛又宗乎經隧營衛者神精氣之化為先天清濁之始經隧者胃之谷水之化此經隧不能不生營衛營衛不能不散而養筋脈筋脈不能不順而資天真為養生涵容造化形質理之然也凡人之視聽言動壯壽此皆理之常也疾病盲瞶關格夭折此皆理之失也故有精神氣血不足則病真神散亂則死者皆由平日攝養之過與不及動止之過逾常度也經曰出入廢則神機化滅升降息則氣立孤危然房勞甚則精血竭而神無所依氣無所附則忽至暴絶也竊常究先哲經義濟生微旨益氣之補肺補精之滋腎皆資其化源也蓋人精血本常不足加之數奪其精真元失化則營氣乃虛虛則衛亦不固精亦滑脫所謂精氣神乃人身三寶相資而不相離者也腎氣竭而精微不能與胃上升腎者先天之原氣也胃者後天之穀氣也二陰升則所謂陰精舉其人壽也二氣陷則所謂陽精降其人夭也故病多頭重或痛氣弱而食少元氣下陷脈即微弱外欲絶而虛洪或見損脈此實元精不足之所致非有外邪之病也此三元之理人身所關最重為醫者不可不講其在虛勞門尤為先務也還丹祕要論夫還丹者乃返本還元之道人稟父母精血而生初為赤子時元精元氣元神無不純全及其年漸長成蓋因眼耳口鼻門所誘一靈真性被色香聲味所觸習染深固以致日復日歲復歲元精化為交感元氣化為呼吸元神化為思慮此三元分泄難復天真故先聖垂言立教載於丹經蓋示人以修補之法精損則以精補氣損則以氣補神損則以神補是為返本還元之道以復之且復者何也以全精為深根全精之道人皆以為絶欲固是若此念不絶雖外不走精精亦隨神散是絶而未絶也以全氣為固蒂東垣曰省言語以養氣此養之小者也其能調息歸根此養之大者也以全神為妙合全神之道大矣若心不外馳無思少慮此全之小者也若能還神還氣返氣還精此全之大者也能全此三者實為身中真藥物也然則身系乎精心系乎氣意系乎神返此三者而逆行還此三者而復真也三全合真乃曰還丹也虛勞一症最大為治最難生生子有治勞三大愆病者醫者不可不講也病家欲求速效不久任師屢更屢試殊不知虛者精氣奪也須多服補藥非假以歲月不能見功病者厭其效遲更師調理故屢換而屢試之後師窺前方之不效疑非此症又更方治詎思其藥力之未到也由是脾胃轉傷遂至不救猶恨天下無良法也此一愆也乃愆之小者也自丹溪倡陽有餘陰不足及相火易動之論而名醫雜著和之統旨大旨又和之故今人才見虛弱發熱一委之陰虛火動開場便用滋陰降火不分陰虛陽虛脾胃勇怯一概用黃柏知母生熟地天麥冬牛膝五味童便之類胃強而陰血乍虧者間或無虞胃弱氣虛而無實熱者服此純苦寒劑其火愈熾甚至啞心胸滿咳嗽痰沫泄瀉聲啞而斃哀哉叩其師則曰書以陰虛火動著其症吾以滋陰應其病病之不起天也而屢試屢死師家病家終莫能醒其服藥之誤而一歸之天籲天何冤耶丹溪倡陽有餘陰不足之論蓋為當時局方溫補之藥害人故著此以救一時之弊至於按病投劑陰虛則補陰陽虛則補陽曷嘗固執又曷嘗堤防流害一至於此據經云火鬱則發之又云輕者可降重者從其性而升之蓋火之性上炎以輕揚之劑鼓之則易散也若不察一以降火為言虛勞之症是因虛而火病也治火者治其標也火盛而症不大虛者先治其火補虛佐之虛極而至火炎者但當治本本足而火自退此自然之理也今人不知虛火何物惟以滋陰降火為治豈不殆哉將以逆其性而使之愈熾矣故曰甘溫去大熱是也按東垣書只有升陽散火湯火鬱湯東垣二方是治火鬱發之之劑陰虛火炎者未為確當二方並無滋陰降火之法豈賢如東垣尚未明此滋陰降火之法歟緣脾胃喜溫而惡寒形寒飲冷則傷肺體雖虛弱膚腠不密易致風邪由是咳嗽潮熱故以輕揚之劑投之其熱頓釋熱退則以補劑收功時醫於此理動輒藉口則曰丹溪諸公云云人身之虛皆陰虛也故任前藥而不疑不思滋陰降火之藥皆斂肺助濕滯痰損脾者風邪火熱皆莫能散愈投愈咳愈進愈熱也此藥吳浙間罹其毒蓋王節齊吳菱山何大英皆浙産益易見信故耳此其二愆也乃愆之大者也膏粱之家厚味相兢內多積聚丹溪曰蒸蒸發熱積病最多嗜欲者中心實怯故每迎師用藥喜補而憚攻抑不知積之不去熱之不去也多補則重閉其氣是資其邪而益其病也初起未久胃氣尚強急當推之而後議補則無反顧之憂若無機會遷延日遠莫能為計欲補則無成功欲攻則胃氣已壞畏首畏尾待死而已此其三愆也乃愆之中者也豫壯歲患此症莫能瘳幸遇至人指示軒歧要領病之禁忌恬淡內觀三年乃起以此深悟此三大愆不敢自祕謹將慎密授受法治吐露篇末以惠蒼生不識同志者宜少其故轍否耶生生子治勞三大愆可謂詳悉醫藥之誤然此乃醫之過也至病者不知調攝往往自誤雖有良劑亦莫能救昔者治一友呈以調病十則令貼座右依法行之果全愈仲景醫門聖也其治虛勞大意謂精生於穀谷入少而不生其血血自不能化精內經於精不足者必補之以味味者五穀之味也谷粟果菜皆天賦自然沖和之味故以食人補陰之功非醯醬烹飪偏厚之味出於人為者補以味而節其勞則積貯漸富大命不傾設以雞口之入為牛後之出欲其不成虛勞寧可得乎夫男子平人但知縱欲勞精孰知陰精日損飲食無味轉勞轉虛轉虛轉勞脈從內變血不外華精液衰而口渴小便少甚則目瞑衄血陰精不交自走盜汗淋漓身體振搖心驚膽怯者比比然也故血不化精則血痹矣血痹則新血不生並素有之血亦瘀積不行血瘀則營虛營虛則發熱熱久則蒸其所瘀之血化而為蟲遂成傳尸勞瘵不可為矣以仲景先師諄諄致戒無非為營衛之道納穀為寶居常調營衛以安其谷壽命之本積精以自剛居常節嗜欲以生其精至病之甫成脈才見端惟恃復脈建中為主治夫建中復脈皆稼穡作甘之良藥一遵精不足者補之以味之旨也豈有泉之竭矣不云建中之理哉後人補腎諸方千蹊萬徑以治虛勞何反十無一全豈非依樣葫蘆徒資話柄耶及其血痹不行仲聖並驅其舊生其新幾希於勞瘵將成未成之際誠有一無二之聖法第牽常者不能用耳試觀童子臟腑柔脆才有寒熱易於結癖成疳待其血痹不行氣蒸發熱則不可為女子乾血經閉發熱不止勞瘵之候更多待其熱勢成縱有良法治之無及倘能服膺於仲景幾先之哲吃力於男子童子女子瘵病將成未成之間其活人之功皆是起白骨而豫生全為彼蒼所眷注矣凡治虛損之病當從難經治法損其肺者益其氣四君子湯加黃耆麥冬五味山藥之類損其心者調其營衛八味湯加枸杞棗仁石斛柏子仁損其脾者調其飲食適其寒溫四君子湯補中益氣湯建中湯參朮膏之類損其肝者緩其中四物湯倍白勺甘草枸杞山萸損其腎者益其精熟地牛膝人參五味菟絲子蓯蓉之類此治損之法也今人樂看方書不過是明醫雜著諸症辨疑活人指掌等小書識見淺近易於觀覽宋元以前諸大家之旨有至老未嘗觸目者間有涉獵丹溪治陰虛之法固未嘗純棄人參節齊則畏之如虎汪石山治病用參耆論及營衛論云丹溪論陽有餘而陰不足者乃對待之言是大概之論陰虛乃營中之陰氣虛非特言腎虛也此論宜深思熟以記之此言發前人所未發深有功于丹溪者近代諸公所云陰虛非精即血故用藥惟養血滋陰殊不知滋陰養血之品非苦寒即濕滯蓋苦寒傷脾濕滯害氣凡人一身只陰陽二氣若陰氣生髮陰氣皆化而為血用之反害陽氣陽氣陷下反化而為火矣此理之不可不明也凡治虛勞當先察其病從何起次則辨其陽虛陰虛更當審其病重何臟大凡虛勞之症以脾腎兩臟為兩大綱蓋腎為先天之根脾為後天之本也然治脾之藥多礙於腎治腎之藥多礙於脾善用者必使治脾之藥無礙於腎治腎之藥無礙於脾斯為上著如表裡兩法虛勞門中在所不用亦有不得不用者蓋人正氣虛則易感邪風寒暑濕之來反滋病勢客邪不盡難於就補又如血痹不行仲景聖法急驅其瘀以生其新不觀顧其虛惟重逐其邪以存正又如丹溪所云虛勞之熱積病最多始則可用子和法及倒蒼法如荊蓬煎丸皆虛勞門中必用之品夫業醫者膽欲大而心欲小毅然獨斷於中病所當瀉則須瀉之幸毋曰虛弱者何敢弄險經云有故無殞亦無殞也設務姑息而一惟調補此猶南宋和議之說豈知邪正不兩立王業不偏安然不伐賊王業亦亡坐而待亡孰與伐之古人以醫譬國豈徒語哉虛勞脈法越人始論損脈其曰脈來軟者為虛緩者為虛遲者為虛芤為中虛脈來細而微者血氣俱虛脈小者氣血俱少脈沉小遲者脫氣仲景更其名曰虛勞虛勞之脈更兼浮大其曰平人脈大為勞極虛亦為勞又謂浮者為裡虛勞之為病其脈浮大手足煩春夏劇秋冬瘥男子浮弱而澀為無子脈得諸芤動微緊男子失精女子夢交脈極虛芤為清穀亡血失精脈微弱而細微者善盜汗而總其義曰脈弦而大弦則為減大則為芤芤則為虛虛寒相搏此名為革婦人則半産漏下男子則亡血失精脈大弦緊外象有餘其實中藏不足不專泥遲緩微弱一端以驗脈也凡虛損脈數為胃氣不足若脈數至八九至此真元虛極多不治經云數則元氣虛數則脾氣虛數則有熱而屬虛大凡脈大而數按之有力者胃氣未傷可任滋陰清火之藥若數而無力元氣已虛滋陰苦寒之藥概不得用若豁然大而數之脈此陽中陰虛一切滋陰之藥用之決不效虛症脈見數病已入深若數大有力而和為病三分虛弱而數病已六分細數緊數多不治若數脈轉弱者胃氣生髮之兆短數則無胃氣細數緊數俱非吉兆弱則無火細則無水數則無陽數為陰火陽為真氣陰火旺則陽氣虛是壯火食氣也細數則氣血兩虛骨蒸勞瘵之病已成矣左尺脈虛弱或細數是腎經真陰不足用六味丸若洪而有力六味中加肉桂以引火歸元右尺脈遲軟或沉細是命門真火不足也用八味丸若洪而有力可暫用知母等兩尺脈微弱是陰陽俱不足也用十全大補湯兩尺脈浮肺氣先絶金不生水也左尺脈弱右尺脈大病名虛損調理非二三年不可右尺脈浮而有力為邪脈後必泄瀉喘促而亡凡豁大脈久病按下尚有渾渾一條者此陰陽未離尤可治也若無一條間在兩邊此陰陽已離決不治此脈常主作瀉蓋夫陽虛不能固下而陰與陽不相合故下不禁而作瀉也凡久病脈浮中沉俱和緩體倦者決死其面色光潤此精神皆發於外決難療矣虛損久病俱是傷脾則肺先受之肺病則不能管束一身脾病則四肢不能為用謹養胃氣以胃為萬物生化之源人但知脾胃喜燥而不知脾陰不足相火亢拒再以燥藥投之是反助其火也但當甘溫之藥滋生元氣四君保元或參苓白朮散火起不必治火有痰不必治痰久病以火為主火為養命之源病急宜緩治攻則離散不可不知凡虛損咳嗽吐血宜保元湯加炒黑乾薑五味子服十數劑諸症俱減忽瀉兩三次此吉兆也乃脾氣醒而濕熱動六脈平和忽見咳嗽亦吉兆也乃肺氣舒而濕痰開豁也仍守前方諸症自愈內傷虛損皆火兆也而水在下水火不交故發咳嗽而喘此皆滋陰降火所致也初用桂制芍藥吳萸少許及甘草人參五味半夏故紙杜仲一溫則火不行水上升如或作瀉則陽下行而胃中所積宿食水穀行矣凡虛損肺脈大氣喘下部脈弦細弱此皆陽上越而不降內寒外熱上熱下寒之症用人參一錢桂制白芍一錢乾薑三分半夏一錢五味子十五粒甘草生炙各三分溫中內收陽氣降下溫肺湯白芍桂汁拌炒枳殼五分甘草五分引陽氣上升大棗半夏各一錢黑姜五分肉桂五分五味九粒煎服發喘加麻黃金浮水升也細辛肉桂五味子皆所以溫腎腎水溫暖則氣上行氣即水中之金是金浮也所謂寒從地起也上行之氣熏蒸於肺停而為津液者復化而為水是水下也所以水從天降也木者火之母也木浮則火在上而腎氣浮寒沉則水在下而腎氣溫其有咳嗽面赤六脈數懶言語怕人鬧此皆腎氣不足治以補脾生肺滋腎之藥五六帖而數脈不減此真元虛而邪火爍也亦用前法以藥煎去頭煎服第二三煎不十劑而數脈退去那時虛火一退中氣便寒用六君子加乾薑肉桂服五六帖脾氣運行痰氣亦行或流於肝腎部分腰以下痛須外以炒鹽尉之內服二陳湯加桃仁玄胡苡仁二帖大腸見痰血而痛止以後服宜補脾虛勞久病泄瀉不止其症多危慎齊方陳臘肉骨灰銅心鍋焦各三錢炒松花一分為末糊丸人參湯下此妙方也用之活人多矣以上論虛損諸法本於慎齊者多其意專在益氣扶脾養陰與治勞瘵之法實有不同蓋虛勞實似勞之症也若不辨明脈症概以寒涼滋陰之品治之死者多矣其可不究心於此篇乎節齊云凡人二十前後色欲過度或勞心竭力以致傷其精血必生陰虛火動之病睡中盜汗午後發熱咳嗽倦怠無力飲食少進亦有火旺主消飲食倍常者甚則痰涎帶血絡吐出血或咳血或吐衄血或有因虛火亢而動血者亦有因血虛而生火者身熱脈沉數肌肉消瘦此名勞瘵此與虛損元氣不足者兩各不同最重難治輕者必用藥數十帖重者期以歲年然必須病者愛命堅心定志絶房色息妄想戒惱怒節飲食以自培其根否則雖有良藥亦無用也此病治之於早則易若到肌肉消瘦沉困著床沉伏細數則難為矣此節齊之說也其本于丹溪但其所云火病大忌服人參則其所用之藥以四物二冬知母皆苦傷脾之品今人多宗而用之其禍獨盛故不録症以色欲過度勞心勞力傷其精血以致陰虛火動其火之動由於精血之不足也精血不足方用滋陰降火補血填精以治之固矣殊不知精血既傷真陰不足但知補其精血之標而不知真陰為精之本也苟知真陰為精血之本而不知脾為至陰精血賴之以生滋陰降火害其脾陰自戕其生生之本也語云識其標只治本治千人無一損虛勞為極虛之症知其虛而不補是捨本求末也何怪其敗乎金匱云五勞虛極羸瘦腹滿不能飲食食傷憂傷勞傷飲傷房室傷飢傷經絡營衛氣傷此即七傷也後人又有陰寒陰痿裡急精速精少陰下濕精滑小便苦數臨事不舉七傷之名然五勞既分主豈五臟七傷而獨主腎之一臟之理當以金匱為法也內有乾血肌膚甲錯甲錯者肌膚如鱗甲錯出也兩目黯黑緩中補虛大黃䗪蟲丸主之大黃十分蒸黃芩三兩甘草三兩桃仁一升杏仁一升白芍四兩乾薑十兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升䗪蟲半升共研細末煉蜜丸如豆大酒飲服五丸按虛勞發熱未有不由瘀血者而瘀血若無內傷則營衛運行不失其次瘀從何起是必飲食起居過時失節營衛凝滯先成內傷然後隨其氣所阻之處血為瘀積瘀積之久牢不可拔新生之血不得周灌與日俱積其人尚有生理乎仲景施活人手眼以潤劑潤其血之干以蠕動啖血之物行死血名之緩中補虛豈非以行血去瘀為安中上著也然此特世俗所稱乾血勞之良劑也血結在內手足脈相失者宜之手足相失者如寸口脈浮趺陽脈沉寸口脈大趺陽脈小此謂相失兼入瓊玉膏滋以血液潤補之藥同用尤妙又細參其症肌膚甲錯面目黯黑及羸瘦不能食必有是三症兼手足脈相失其中必有瘀血方敢下之審之不當又不可概用也慎之全是營血瘀積胃中而發現於肌膚面目所以五臟失中州之灌溉而虛極也此與五臟之本病不同故可用其方而導去其胃之血以內谷而流通營衛耳許州陳大夫傳仲景百勞丸云治一切勞瘵積滯不經藥壞者宜服當歸乳香沒藥各一錢虻蟲十四個人參二錢大黃四錢水蛭十四個桃仁十四粒為末蜜丸如桐子大每作一服至百丸五更用百勞水過服下惡物為度服白粥十日百勞水即甘瀾水以杓揚千遍前方大黃䗪蟲丸仲景虛勞門中首重此方以虛勞發熱由於瘀血者多此為虛中實症先師不顧其虛而急用此方驅瘀生新真聖法也後人皆畏而不敢用待死無救痛哉殊不知虛勞發熱乾血之症甚多與其束手而待斃莫如取用以求生聖法煌煌豈虛語哉但用此法者必須詳明脈症審其果有乾血用之又何慮乎若非乾血症此法又不可亂用也金匱於虛勞不足之證取用小建中湯虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之桂枝炙草各三兩飴糖一升大棗十二枚芍藥六兩生薑一斤黃耆建中湯虛勞裡急諸不足黃耆建中湯主之即於小建中湯內加黃耆一兩五錢重用甘草一遵內經精不足者補之以味之旨蓋虛勞病而至亡血失精消耗精液枯槁四出難為力矣此時若再以苦寒之味傷其中氣有死而已惟用稼穡作甘之味急建其中俾飲食增精液旺以至充血生精而復其真陰之不足非聖法而何若藥味過食甘嘔家忌之若服之漸覺氣阻氣滯者更當增入橘皮砂仁以行之也千金翼取金匱炙甘草湯炙甘草湯一名復脈湯虛勞不足汗出而悶脈急悸行動如常不出百日危急者十一日死炙草四兩桂枝生薑各三兩麥冬半升麻仁半升人參阿膠各二兩大棗三十枚生地黃一斤酒七升以治虛勞此方治傷寒脈結代心悸動邪少虛多之症今虛勞門中並用此法亦於建中湯推廣其意原虛勞之體多有表熱夾陰虛者所以其症汗出而悶傷寒汗出而熱解虛勞汗出而反悶所以傷寒宜汗虛症不可汗也表之固非但滋陰亦非此方用地黃門冬人參阿膠大隊養陰之藥加以薑棗桂枝和其營衛服之有汗而脈出熱解但虛勞之人胃中津液素虛非傷寒暴病邪少虛多之比桂枝分兩太多服之津液每隨熱勢外越難以復收多有淋漓沾濡一晝夜者透出此關急以本方去桂枝生薑二味三倍加入人參隨繼其後庶幾津液復生乃致營衛盛而諸虛盡復豈不快哉丹溪論勞瘵主乎陰虛者蓋自子至巳屬陽自午至亥屬陰陰虛則熱在午後子前寤屬陽寐屬陰陰虛則汗從寐自盜出也升屬陽降屬陰陰虛則氣不降而痰涎上逆連綿不絶也脈浮屬陽沉屬陰陰虛則浮之洪大沉之空虛也此皆陰虛之證用四物湯加黃柏知母主之然用之多不效者何哉蓋陰既虛矣火必上炎而當歸川芎皆氣辛味大溫非滋陰降火之藥又川芎上竄尤非虛炎短乏者所宜地黃泥膈非胃熱食少痰多者所宜黃柏知母苦辛大寒雖曰滋陰其實燥而損血雖曰降火其實苦先入心久而增氣反能助火至其敗胃所不待言不若用苡仁百合天麥冬桑白皮地骨皮丹皮枇杷葉五味子棗仁之屬佐以生地黃汁藕汁人乳汁童便等如咳嗽則多用桑白皮枇杷葉有痰加貝母有血多用苡仁百合阿膠熱甚則多用地骨食少則多用苡仁米至七八錢而麥冬常為之主以保肺金而滋生化之源往往應手而效蓋諸藥皆稟燥降水之氣氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也以施於陰火動之證又當溽暑伊鬱之時而商飈一動炎敲如失矣火氣稍平又當用甘溫以復其本與治暑熱用白虎湯同意然彼是外感外感為有餘故用寒沉藏之藥而後能補其偏此是內傷內傷為不足但用燥收降之劑而已得其平矣此藥之權衡也虛勞之疾百脈空虛非黏膩填之不能實也精血枯涸非滋濕之物濡之不能潤也宜用人參黃耆地黃二冬枸杞五味之屬各煎膏另用青蒿以童便熬膏及地黃汁藕汁乳汁薄荷汁隔湯煉過酌定多少並麋鹿膠霞天膏合成和勻每日用一匙滾湯化服如欲行瘀血加入醋煮大黃元明粉桃仁韭汁之屬瘀血乍流於胃周身之血尚未痹者可加用之免致枯涸之患欲止血加入京墨之屬欲行痰加入竹瀝之屬欲降火加入童便之屬凡虛勞之症大抵心下引脅俱瘀蓋滯血不消新血無以養之尤宜月膏滋加韭汁桃仁泥呼吸少氣懶言語無力動作目無精光面色㿠白氣血兼虛用麥冬人參各三錢陳皮炙草桔梗各五錢五味子二十一粒為極細末水浸油餅為丸如雞子豆大每服一丸細嚼津液咽下名精氣丸氣虛生脈散人參麥冬五味子補肺即所以補氣肺為諸氣之本也不用白朮白朮性燥恐傷陰也血虛則三才丸人參天冬地黃補腎即所以補血腎為諸血之源也不言四物四物濕滯恐礙脾也以上諸勞諸方首選大黃䗪蟲丸重在逐瘀血瘀血不去新血不生是驅邪以存正也次用建中諸法俾建立中氣蓋中氣足五臟得滋是陽生而陰長也再用苡仁之屬以治肺虛是金清而化行也後用地黃膏滋之屬以補腎氣乃壯水以生陰也較之四物知柏之屬為佳也陳藏器諸虛用藥凡例虛而多夢紛紜加龍骨虛勞頭痛發熱加枸杞葳蕤虛而欲吐加人參虛而不安亦加人參虛而多熱加地黃牡蠣地膚子甘草虛而冷加當歸川芎乾薑虛而損加鍾乳蒺藜蓯蓉巴戟虛而大熱加黃芩天冬虛而多忘加茯神遠志虛而口乾加麥冬知母虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而驚悸加龍齒沙參紫石英小草若冷則用紫石英小草若客熱則用沙參龍齒不冷不熱皆用之虛而身強腰中不利加磁石杜仲虛而多冷加桂心吳萸附子烏頭虛而勞小便赤加黃芩虛而客熱加地骨皮黃耆虛而有痰加生薑半夏枳實虛而小便利加桑螵蛸龍骨雞䏶胵虛而小便不利加茯苓澤瀉髓竭不足加地黃當歸肺氣不足加二冬五味子心氣不足加人參茯苓菖蒲肝氣不足加天麻川芎脾氣不足加白芍白朮益智腎氣不足加熟地遠志丹皮膽氣不足加酸棗仁地榆神昏不足加硃砂預知子茯神虛勞之症皆見發熱而虛損之熱多發於外輕手按之即得或潮熱或往來寒熱熱有定時不比骨蒸之熱熱在於里皮膚不為大熱按之筋骨之分則熱愈甚熱無定時或至下午則更熱而煩兩顴赤色此勞瘵之熱深與虛勞之熱異也虛勞發熱治法俱全骨蒸之熱治法有初中末之層次大凡蒸未久血未痹脈不至弦澀數細數其病尚淺治之可用輕揚清肌諸藥或逍遙散白朮茯苓白芍當歸柴胡炙草薄荷生薑茯苓補心湯四物湯合參蘇飲人參柴胡散茯苓白朮柴胡半夏曲赤芍當歸人參甘草乾葛秦艽鱉甲散鱉甲柴胡地骨皮知母秦艽當歸若蒸已日久營血已虧脈來見數食少形羸治之已難即當用建中復脈六味諸方若飲食未減者或用草還丹青蒿一斗五升童便三斗文武火熬約童便減二斗去蒿再熬至一斗入豬膽七枚再熬數沸用甘草末收和為丸如桐子大每服五十丸參以清肌諸味加鱉甲秦艽丹皮地骨皮知母薄荷銀柴胡或五蒸湯茯苓甘草竹葉地黃乾葛知母黃芩石膏粳米水三盞小麥二合煎至二盞去麥納諸藥煎至一盞服如葛可久保真湯補虛清熱皆可選用若骨蒸日久血痹不行當用祛血法大黃䗪蟲丸若食少形羸此法不可用矣惟宜平調氣血或冀什一至若凝血化蟲食人精血昔人雖有獺肝殺蟲諸法亦惟脾氣未敗形體尚充脈雖數而中有胃氣亦必病人耐煩堅心或入山林或居靜室清心戒欲專意保養庶幾可望否則雖有良法亦何用哉骨蒸由氣血虛不能化血血乾則火自沸騰肉如針刺骨熱煩疼或五心俱熱或兩肋如火或子午相應或晝微惡寒夜發大熱雖腎經所主傳變不常蒸上則見喘嗽痰血唇焦舌黑耳鳴目眩等症蒸下則見夢遺淋濁泄瀉腰疼腳痛等症蒸中則見腹脅脹痛四肢倦怠等症傳尸由血虛不能化精血不化情則血痹矣血痹則新血不生並素有之血亦瘀積不行血瘀則營虛營虛則岌熱熱久則蒸其所瘀之血化而為蟲遂成傳尸瘵病窮凶極厲竭人之精氣養蟲之神氣人死則蟲亦死其遊魂之不死者傳親切之一脈附入血隧似有如無以後蟲日榮長人日凋瘁經三傳而蟲為靈非符藥所能制矣蘇遊論曰傳尸之候先從腎起初受之兩脛痠疼腰背拘急行立腳弱飲食減少兩耳颼颼直似風聲夜臥遺泄陰汗痿弱腎既受訖次傳於心心初受之夜臥心驚或恐悸心懸氣吸欲盡夢見先亡有時盜汗飲食無味口內生瘡心氣煩熱惟欲眠臥朝輕夕重兩頰口唇悉皆赤紋如胭脂有時手足五心煩熱心既受已次傳於肺肺初受之咳嗽上氣喘臥益盛鼻乾口燥不聞香臭如或忽聞惟覺朽腐有時噁心欲吐肌膚枯燥時或疼痛或似蟲行干皮細起狀如麩皮肺既受已次傳於肝肝初受之兩目㿠㿠面無血色嘗欲顰眉視不能遠日常乾澀又常赤痛或復睛黃常欲合眠及時睡臥不著肝既受已次傳於脾脾初受之兩脅虛脹食不消化及時瀉利水穀生蟲有時肚痛腹脹雷鳴唇口乾燥或生瘡腫毛髮乾聳無有光潤或時上氣撐肩喘息利赤黑汁見此症者不可治也傳尸男子自腎傳心肺肝脾女子自心傳肺肝脾腎五臟復傳六腑而死矣有始終只傳一經者有專著心腎二經而不傳者大要以脈症為驗抱拙子曰勞瘵之症有骨蒸殗殢伏連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰若骨髓熱者為骨蒸半臥半起為殗殢五臟內傳為伏連諸疰者即今之傳尸也蓋疰者注也自上注下與前人相似故曰疰其變多種大概令人寒熱沉沉默默不的知其所苦無處不患世之人聞其名則神驚而志恐一抱其病謂之必死無生往往淹延竟至不救傷哉此病四方之民皆有之然東南之民患者接踵有傳染而殞絶子孫者西北方患者甚少是何故耶蓋西北之地土厚水深居民食麵啖肉不嗜湯飲居稟實臟腑固東南之地土薄水淺居民食米啖魚多嗜湯飲居稟弱臟腑滑所稟既殊血氣亦異方土之所致也凡人一身之間三尸九蟲均有至矣前云血泣化蟲此云三尸九蟲其說不同何也蓋血瘀熱蒸化而為蟲者實有之而三尸九蟲因人之虛而為患者亦必然之事治者但當察其蟲之果否而治不必究其蟲之何起何滅也人呼則呼人吸則吸北人肌肉厚膚腠密有以滋養隱而不動南人肌肉薄膚腠疏無以滋養動而不隱不隱則害人始而呼吸血氣血氣既少呼吸真氣真氣既衰其蟲亦困將隨人殞獨肺蟲一種則稟殺厲之氣已成靈物人將氣絶飛遁而出患傳尸勞而死者氣絶死時果有蟲自鼻飛出知者預用綿裹其面而親戚諸人亦不得空腹近之體虛者自當愛護及遠避之為先著也變化不測一著虛衰之人則至於死所以為之傳尸瘵瘵古方雖有貍骨獺肝天靈蓋等方用之未嘗見效惟在辨症分明辨之之法須用的乳香薰病人之手乃仰手以掌心復其上熏良久手背上出毛長寸許白而黃者可治紅者稍難青黑者即死若熏久無毛長者即非此症又法燒安息香令煙入病人口吸之咳嗽不止者乃傳尸也不嗽者非傳尸也若血氣未敗精神未散脈不弦數之時早用崔氏灸四花穴法崔氏四花穴六代傳尸第一代蟲傷心宜灸心俞穴並上下如四花樣第二代灸肺俞四穴如前第三代灸肝俞四穴如前第四代灸厥陰四穴如前第五代灸腎俞四穴如前第六代灸三焦俞四穴如前及藥症相對必有所濟若以為難治之症而即棄之非仁術也其可乎哉瘵病最易傳染人能保護元氣節勞斷欲蟲不可得而傳也惟縱情恣欲精血內耗邪乘虛入以致傳染或婦病思男男病思女一覿其面隨即染傷不可不知也治療瘵之法固本為先驅蟲為次安息阿魏蘇合沉香冰麝犀角雄精皆有驅邪伐惡之靈更須以天靈蓋助之蓋尸氣淹纏得枯骨導之使鬼飛越於是乎瘥外則虎牙貍骨水獺穿山全蠍蜈蚣皆猛厲之品可以奪尸蟲之魂要之先以芎歸血餘散之於根本之地尸疰二症惟調養如法用藥得宜果有生全者始治先於癸亥日二更六神皆聚之時灸腰眼穴七壯然後用藥倘不能待先用藥亦可疰病即似勞症但兩足無力行則酸疲是也其治法六脈洪數六八物湯脾肺不足補中益氣睡不穩歸脾湯不思食六君子湯隨症類推但煎劑中須加入忍冬葉三錢同煎本草以其葉能治尸疰也煎膏亦可灸腰眼穴治令病者解去下衣舉手向上略轉後些則腰部兩旁自有微陷可見是名鬼眼穴即俗人所謂腰眼穴也正身直立用黑點記然後上床合面而臥用艾炷灸七壯或十一壯尤好其蟲必於吐瀉中而出燒燬遠棄之可免傳染此比四花等穴尤易見效金匱治冷勞鬼疰一門相染附肘後獺肝散一方獺肝一具炙乾末之水服方寸匕日三服乃殺蟲之良劑也然此但能殺蟲未可逐瘀仲景另出手眼制緩中補虛大黃䗪蟲丸一方又援陳大夫百勞丸一方加入人參只作一服以取頓快蓋於此時而用力方圖十全其五也逮至束手無策而取用獺肝以去其蟲蟲去其人可獨存乎然蟲亦不可不去也臟氣未敗尚或望其可生也羅氏紫河車丸云治傳尸勞三月必效其餘勞症只消數服紫河車丸河車一具用米泔水浸一宿洗淨焙乾鱉甲酥炙桔梗胡連白芍大黃龍膽草敗皮鼓心醋炙黃藥子貝母知母各二錢半芒硝犀角莪朮各一錢五分辰砂二錢蜜丸辰砂為衣空心酒溫服四十丸陳無擇治勞蟲法桃枝柳枝桑枝梅枝石榴枝各七莖長四寸青松一小握用童便一升半蔥白七莖去頭葉煎及一半去渣另真安息香阿魏各一分煎一鍾濾去渣調辰砂半錢檳榔一分麝香一分分作二服調下五更初一服五更三點後一服至巳時後取下蟲色紅者可治青者不可治見有所下即進稀粥飲溫暖將息忌粉面生冷毒物合時須擇良日不得令貓犬孝服豕兔婦人見之凡治傳尸一月之中上旬十日蟲頭向上用藥治之易為力中旬下旬蟲頭向下雖治無功經云六十日治十得七八八十日治十得三四過此以往焉保生全集方外還丹生生子曰余遊方之外殆五十有年所矣至人難遇大藥煉難抱朴子曰不得已金丹若服草木之藥及修小術可以延年遲死但不得仙也顧人之難得者生釋曰生死事大無常迅速凡為道者常患於晚不患於早也余故採仙經要語以示人之攝養須當及時藥餌須早修制不可盡委之天命蓋人定亦可勝天也仙經云養身以不傷為本傷之一字包括甚廣非獨五味七情過多為傷如才所不逮而困思之為傷力所不勝而強舉之為傷汲汲所欲為之為傷久談言笑之為傷寢息失時之為傷沉醉嘔吐之為傷飲食即臥之為傷跳走喘乏之為傷勉強色欲之為傷凡言傷者亦不便覺也久則損壽耳是以養生之家唾不及遠行不疾步耳不極聽目不極視坐不致久臥不及疲先寒而衣先熱而解不欲極飢而食食不過飽不欲極渴而飲飲不過多凡食多則結積聚飲多則成痰癖不欲甚勞甚逸不欲起晚不欲汗流不欲多睡不欲多啖生冷不欲飲酒當風不欲數數沐浴冬不及寒夏不窮涼不露臥心下不眠中見肩大寒大熱大霧大風皆不欲冒之故善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾閉邪有吞吐之術流行營衛有補瀉之法節宣勞逸有與奪之要忍怒以全陰氣抑欲以養陽氣然後再服草木以救虧缺後金丹以定無窮長生之理盡於此矣虛勞一症有從吐血而成者多矣吐血之症未必致成勞也蓋因治之不妥以致變勞或用寒涼以敗其胃或用止澀以固其流血痹不行內熱從起然亦有因虛損內熱逼其血而外脫者大凡勞症未見血者尚輕已見血者為重金匱敘勞症於血痹下蓋以此也凡吐血之源七情六淫皆足吐血陰虛陽虛皆能起火血症之來皆從火逆然火有實火有虛火最當詳審或折或散或止或行隨症變通幸毋膠執入手一差始終無救可不慎歟吐血之症初起時多用大黃下之此指體實症實或瘀血逆行或實火炎上非大黃之苦寒折之下行不足以止其滔天之勢蓋血以下行為順上出為逆亦因曲而為直之法也苟涉虛而或病久者其可妄下之乎下後即當謹慎浚其源而導其流氣血兩相依附何虛損之有哉此以攻為補之一策也吐血之因雖有六淫七情之不同然其要當辨虛實新久失血之症有吐咯咳衄之各異其臟有心腎肝脾失血之初雖云屬火者多不知來時屬火至後屬虛寒涼能治實火若血後火起虛乎實乎失血之久雖云屬虛者多要知始雖屬陰虛久則氣虛滋陰能滋陰血若血虛氣脫宜乎否乎古人血脫益氣參耆仍為要劑今治血虛專執四物失血為症最多治之不得其法則生殺反掌虛勞為症最大醫而不知其要是猶入井投石胸中無見必然蒙朧人之死也醫乎天乎六淫六淫之邪從外來屬實者多七情七情之傷於內臟屬虛者多虛實虛則宜補當辨虛中有實實則當瀉須知實里藏虛新久新而暴者宜行宜清久而緩者宜止宜補吐吐血嘔血出於胃吐血成碗成盆也咯咯血唾血出於腎血如紅縷在痰中吐出隨咯而出也咳咳血嗽血出於肺或夾痰而咳者或嗽血而無痰衄衄血亦出於肺但血及行清道乃行經之血走而不守隨氣而行火氣急隨經犯清道而出於鼻也心統攝於心腎施泄於腎肝歸藏於肝脾生長於脾吐血有煎厥搏厥之分煎厥者從陰虛火動煎灼既久血絡漸傷旋至吐血其勢雖緩其病已深搏厥者多挾肝火經云火怒則形氣絶而血苑於上使人搏厥搏即雷風相搏之搏心熱為火肝熱為風風火相搏厥逆上衝風來如潮湧之勢渤渤澥澥若有聲其血直衝而出其勢甚急故治煎厥當養陰清火為主新起未虛或兼降火消痰搏厥勢急其暴起而體實者宜直折之如大黃桃仁赤芍丹皮之屬若病久體虛血來暴出不止又當止之如十灰散大薊小薊柏葉荷葉茅根茜根大黃山梔丹皮棕櫚炭上藥燒灰存性研細紙包碗蓋地上一夕用時先以白藕打碎絞汁或蘿蔔汁亦可磨京墨半碗調灰五錢花蕊石散花蕊石燒過存性研末用童便一盞煎醋調末三錢極甚者五錢食後服如男子病則和酒一半婦人病則和酒醋一半同調藥其瘀血化為黃水服此藥後其人必解其病體卻用後藥而補之花蕊散治氣虛血凝瘀積壅聚胸膈作痛宜用重劑若內損吐血出如湧泉口鼻皆流不急止之立死方用側柏葉散側柏葉蒸焙一兩五錢荊芥穗燒灰人參各一兩入飛羅面一錢新汲水調如稀糊不拘時啜服若有形之血不能速生無形之氣所宜急固無形能生有形也若不察其虛實誤以寒涼止血之品有死而已繆仲純治血三法云宜行血不宜止血宜補肝不宜伐肝宜降氣不宜降火其用之藥專用白芍炙甘草和肝枇杷麥門冬薄荷葉橘紅貝母清肺苡米山藥蓮子養脾韭汁番降香真蘇子下氣青蒿鱉甲銀柴胡丹皮地骨皮清熱酸棗仁茯神養心山茱萸枸杞子補腎然陰無驟補之法非多服不效此正治陰虛火炎煎厥吐血之法也仲純所用諸藥甘淡平和不寒不滯即地黃亦不收用以地黃雖能止血然濕滯之品非痰多食少者所宜而芎歸辛竄仍失血家所忌其法可師允為虛勞失血之良法也慎齊云血症屬火者多五臟六腑皆有血症然來時是火至後屬虛一概寒涼胃氣漸虛生髮之氣漸衰血以氣為主血無氣養血不歸經脾肺虧損而咳嗽喘促泄瀉理必然也血熱動火滋陰可宜血虛起火若用滋陰降火復損其氣立盡而已聖人立法血脫益氣謂升舉其陽而血必然下降倘氣不上升血必不復下可見氣有生血之妙血無益氣之功旨哉斯言吐血症候多有傷風日久未經解散內郁其熱火鬱宜發之茯苓補心湯見前最好凡心氣不足虛火上炎或咳嗽日久而見血或傷寒表裡不清漸傳而至心氣耗不能統血與夫失血之後發熱不止並服此方服之立效虛勞吐血之症多起於咳嗽咳嗽之血肺病也有肺病而用止血治肺之藥多不效者何也蓋以但知治肺而不治腎也人身腎脈入肺循喉嚨挾舌本其支者從肺出絡心注胸中故二臟相連病則俱病腎中有火有水水乾火燃陰火刑金故咳水挾相火而上化為痰入於肺肺為清虛之腑一物不容故咳嗽中有痰唾帶血而出者腎水挾相火炎上之血也豈可以咳嗽獨歸之肺耶褚氏遺書津液篇云天地定位水火乎中人肖天地亦一水焉在上為痰在下為水伏皮為血從毛竅中出為汗可見痰也血也水也本一物也血之帶痰而出者乃腎水夾相火炎上也又云服寒涼者百不一生飲溲溺者百不一死童便一味可謂治血之要藥然但暴發之際用之以為降火消瘀之急劑則可若多服亦能損胃惟六味地黃一方獨補腎水惟不寒涼不損脾胃若食少面黃大便泄瀉者又非所宜久服則水升火降又須用人參救肺補胃藥使金能生水滋其化源也六味加黑薑北五味能止失血潮熱納氣歸腎若內傷勞倦漸成虛損脾肺受傷咳嗽紅痰寒熱似瘧食少自汗脈洪而豁當從脾肺調治慎齊法中最詳若作陰虛火動治之必致危殆凡治血之症前後調理須按三經用藥心主血脾統血肝藏血歸脾湯一法三經之方也遠志棗仁補肝以生心火茯苓補心以生脾血參耆甘草補脾以調肺氣木香者香先入脾總欲使血歸於脾故曰歸有鬱怒傷肝思慮傷脾者尤宜火旺者加山梔丹皮火衰者加丹皮肉桂再當參以八味丸以培先天之根治無餘法矣余治法另詳吐血門虛勞門中諸本其發熱咳嗽二症亦另立法蓋虛勞之症無有不兼發熱咳嗽者以上諸法無不兼之也故不必再立治法而夢遺怔忡自汗盜汗皆虛勞必有之症當於本症參之附五臟虛損治法凡治心虛勞者恍惚憂煩少顏色或驚悸多汗人參養營湯歸神丹大歸神丹人參當歸棗仁白茯苓遠志薑汁炒各一兩龍齒五錢琥珀五錢金銀箔各二十張酒煮稀糊丸如小豆大每服二十丸日用麥門冬湯下夜用酸棗仁湯下養心丸之類虛而煩熱而渴者十全大補湯心懸如大飢之狀者平補鎮心丸主之柏子養心丸寧心保神益血固精祛煩熱除驚悸聰明不忘枸杞柏子仁搗用紙略去油生地酒洗蒸曬五次茯神麥冬元參各二兩當歸三兩石菖蒲甘草各五錢為末除柏子仁生地黃搗如泥余藥和入蜜丸睡時每服五十丸白湯下平補鎮心丸治心血不足時或怔忡夜多亂夢如墮岸谷常服安腎益營衛人參龍齒各二兩半茯苓茯神麥冬五味各一兩二錢五分車前子遠志天冬山藥薑汁炒熟地酒蒸各一兩半硃砂一兩五錢為衣棗仁炒三錢煉蜜丸每服八九十丸早晚米飲湯下或溫酒下肺虛呼吸少氣鬨然喘乏咳嗽嗌乾宜以紫菀散人參紫菀茯神知母五味子桔梗阿膠貝母甘草調其氣若短氣少氣不足以息者四君子湯氣促氣短上焦虛而熱者加生脈散虛而寒者加十全大補湯表虛不任風寒者黃耆建中湯皮膚乾燥日漸黑瘦宜麥門冬飲人參枸杞茯神甘草五味子麥冬各五錢加姜水煎服之咽喉乾者亦同津液不足而咳者四君子加五味桔梗脾虛者面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食少進宜益黃散丁香四錢不見火陳皮去白二兩青皮去白訶子泡去核甘草各一兩每服一兩五錢水煎服量大小加減或參苓白朮散加木香藿香香附子食後便臥精神短少補中益氣湯加砂仁手足痠軟行步欹側四君子湯黃耆湯手足顫振筋瞤肉惕似風十全大補湯手足厥軟不耐勞役一有動作多汗困熱十全大補湯臟腑不調中氣不運病久不能食理中丸少加附子肝虛目眩筋攣面青恐懼如人將捕之狀宜六味地黃丸加牛膝肉桂人參川芎木瓜主之眠昏少精神無比山藥丸治諸虛百損五勞七傷肌體清瘦膚槁脈弱赤石脂茯苓澤瀉山萸牛膝酒浸巴戟去心各一兩山藥杜仲炒去絲菟絲子熟地各三兩蓯蓉酒浸焙五味三兩為末蜜丸每服五十丸目中溜火視物昏花寢汗憎風行步不正臥而多驚補益腎肝丸柴胡羌活生地黃炒苦參防己炒各五分泡附子肉桂各一錢當歸二錢共研細末雞豆大每服五十丸溫水送下視物不明筋弱陽痿陰下濕癢八味地黃丸腎虛者背脊腰膝及陰內痛耳鳴精滑小便頻數宜八味地黃丸去附子加鹿茸五味山藥以生其精若腰背肩胛頭痛不任房事十全大補湯腰胯腿膝無力牛膝丸腰膝痠軟下元虛冷八味地黃丸腳弱腰痠無比山藥丸腎冷精虛陽事不舉還少丹離珠丹金鎖正元丸三才封髓丹選用夢遺白濁巴戟丸小便如泔寒精自出小菟絲子丸小便頻數而遺十全大補湯加益智離珠丹治下焦陽氣虛弱臍下冷痛足胻寒杜仲炒去絲三兩萆薢二兩訶子炮五個龍骨一兩破故紙巴戟酒浸去心各三兩胡桃一百個去皮硃砂另研一兩半縮砂仁五錢共研末酒為丸硃砂為衣每服三十丸空心溫鹽湯送下金鎖正元丹五倍子八兩補骨脂酒浸炒十兩肉蓯蓉洗巴戟去心葫蘆巴炒各一斤蓯蓉六兩龍骨二兩硃砂三兩另研上藥入研藥令勻酒糊丸每服二十丸空心鹽湯送下三才封髓丸降心火益腎水麥冬熟地各五錢黃柏炒三兩炙草七錢半砂仁一兩半為細末糊丸每服五十丸用蓯蓉五錢作片酒浸一宿次日煎三五沸去渣空心服巴戟丸五味子巴戟去心蓯蓉人參熟地白朮菟絲子覆盆子益智炒補骨脂去毛茴香各一兩白龍骨二錢半牡蠣煅二錢上藥煉蜜丸每服五十丸空心鹽湯下小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精又治心腹脹滿腳膝痿緩小便滑數股內濕癢水道澀痛小便出血時有遺瀝並宜服之菟絲子酒浸五兩石蓮子肉二兩白茯苓一兩山藥二兩七錢半打糊上味山藥糊丸每服五十丸空心鹽湯下腳無力木瓜湯下虛勞門要用方金匱桂枝龍骨牡蠣湯桂枝白芍龍骨牡蠣生薑各三兩大棗十二枚甘草二兩本文云失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交十全大補湯人參白芍茯苓肉桂川芎黃耆白朮甘草當歸熟地為粗末每服二三錢生薑三片棗二枚此方治虛勞不足方中肉桂未可為君審其腎虛腰腹痛者少用肉桂若營衛之虛須少用桂枝調之取為佐使可也人參養營湯白芍一錢人參一錢蜜炙黃耆一錢炙草一錢五味子炒杵七分半遠志去心十一分當歸一錢陳皮一錢桂心一錢白朮一錢熟地七分半茯苓七分半姜一片棗一枚此方補養心脾而生營血於婦人科亦宜十四味建中湯當歸酒浸焙白芍白朮麥冬炙草肉蓯蓉酒浸人參川芎肉桂附子泡黃耆製半夏熟地酒浸焙茯苓等分生薑三片棗一枚每服三錢空心服此方大補脾腎虛勞門中要方也但桂附同用腎中陽虛宜之樂令建中湯前胡細辛淨黃耆蜜塗炙人參桂心桔皮去白當歸白芍茯苓麥冬炙草半夏各一兩每服四錢姜四片棗一枚此方治虛勞發熱以建其營中之血方中有前胡麥冬意在退熱亦一法也留之耆附湯蜜炙黃耆炮附子等分每服四錢加生薑煎治氣虛陽弱虛汗不止肢體倦怠參附湯人參半兩炮附子去皮臍一兩分作三服加生薑煎治真陽不足上氣短急自汗盜汗氣短頭暈以上二方治陽之法蓋陰虛之極者陽亦虛又當以陽為急也陽虛欲脫又龍雷之火無制非此方莫能治也保和湯二母二冬冬花各三錢花粉苡仁杏仁炒各二錢炙草紫菀五味兜鈴百合桔梗各一錢阿膠生地當歸紫蘇薄荷各五分生薑三片水煎飴糖一匙日三服此方治虛勞肺燥成痿服之大補瓊玉膏人參二十六兩淨為末白茯苓二十四兩為末生地黃十六斤搗取汁蜜六斤上汁入銀石器內以油紙包口外仍以箬轉縛緊重陽內懸胎煮之文武火不住三晝夜入井中浸一日去火毒又煮一日出陰毒取出空心服酒或白湯調下八味丸即六味丸加肉桂熟附子各一兩此補腎之主方也腎兼水火腎水真陰不足六味丸腎中真陽不足八味丸此定方也方中去附子加五味名都氣丸能治腎水真陰不足虛火上炎咳嗽喘急面赤足冷上熱下寒諸症丹溪大補丸黃柏炒褐色知母酒炒各三兩熟地酒蒸敗龜板酥炙各六兩共為末豬脊髓和蜜為丸梧子大每服七十丸空心淡湯送下補陰丸黃柏半斤鹽酒炒知母酒浸炒熟地各三兩敗龜板酒浸炙四兩白芍陳皮牛膝各二兩瑣陽當歸各一兩五錢虎骨一兩酒浸酥炙共為末酒煮羊肉丸桐子大每次服五六十丸空心鹽湯下冬加姜半兩虛勞之症陰虛者十常八九丹溪著陽有餘陰不足之論而定二方與東垣補中益氣湯旗鼓相對氣下陷而不能升則用東垣火上升而不能降則用丹溪二老人入理深微各造其極無容議也而丹溪之法用多不效者何哉深推其故而立法者無過用法者不得法中之奧過端四出蓋陽常不足陰常有餘二語未嘗細心分辨耳夫陽之有餘得十之七陰之不足得十之三此所謂真有餘真不足也陽常有餘一切補陰之藥宜用之而無恐多用之亦無害是則補陰在所必需矣若陰之不足者十存其三而陽之有餘者十存四五亦名有餘而實真不足也補陰寒涼之品尚敢恣用乎不知此義而恣用之豈非不慮其後轉成陰盛陽虛清穀盜汗等症究竟陰基已壞即欲更補其氣其如味之不能載何故再致叮嚀俾用昔人法如持衡在手較量於輕重之間可矣天真丸精羊肉七斤去筋膜脂皮批開入下藥末肉蓯蓉十兩當歸十二兩淨洗山藥濕者去皮十兩天門冬去心焙乾一斤上四味為末安羊肉內縛裹用無灰酒四瓶煮令酒盡再入水二升煮候肉糜爛再入黃耆末五兩人參末三兩白朮末二兩熟糯米焙乾作餅將前後藥末和丸如梧子大一日二次服三百丸溫酒下如難丸用蒸餅五七枚焙乾入臼中杵千下丸之水腫臌脹許學士云臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱即腫脹也然脹亦有頭面手足盡腫者大抵先頭足腫後腹大者水也先腹大後四肢腫者脹也水腫經云三陰結謂之水三陰者手太陰肺足太陰脾足少陰腎也夫胃為水穀之海水病無不本之於胃經乃屬之脾肺腎者何也足太陰脾足以轉輸水精於上手太陰肺足以通調水道於下海不揚波矣惟脾肺二臟之氣結而不行後乃胃中之水日蓄浸灌表裡無所不到也是則脾肺之氣可不伸耶然其權尤重於腎腎者胃之關也腎司開闔腎氣從陽則開陽太盛則關門太開水宜下而為消腎氣從陰則闔陰太盛則關門常闔水不通而為腫矣經又以腎本肺標相輸俱受為言然則水病以脾肺腎為三網矣金匱分五水之名五水者分風水皮水正水石水黃汗也風水者脈自浮外證骨節疼痛惡風若脈浮身重汗出惡風者防己黃耆湯主之防己黃耆白朮甘草姜棗風水惡風一身悉腫脈浮不渴無大熱者無大熱者其兼發熱可知越婢湯主之麻黃石膏甘草姜棗惡風者加附子皮水其脈亦浮外證跗腫按之沒指不惡風其腹如鼓不渴當發其汗渴而下利小便數者不可發汗恐亡其津液也故云不渴當發其汗皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己二兩黃耆三兩桂枝二兩茯苓二兩甘草二兩厥而皮水者蒲灰散主之蒲灰半分滑石三分二味杵為散日三服又云水之為病其脈沉者屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子湯麻黃甘草附子浮者宜杏子湯杏子湯闕尤在涇云恐是麻黃杏仁甘草石膏湯石水其脈自沉外證腹滿不喘經云肝腎並沉為石水其水積胞中堅滿如石不上大腹在厥陰部分即少腹疝瘕之類是也不知者每治他病誤動其氣上為嘔吐而致死也按風水皮水脈皆浮風水自汗惡風皮水不惡風正水石水其脈皆沉正水自喘石水不喘又當一身悉腫四肢腫跗踵腹滿細微辨之黃汗之水如黃柏汁其脈沉遲發熱胸滿四肢頭面腫久不愈必致癰膿耆芍桂酒湯主之黃耆五兩芍藥桂枝各三兩苦酒一升桂枝加黃耆湯亦主之黃汗一症脈陰症陽後世名之痹水是也再當參黃痹門里水者一身面目黃腫其脈沉小便不利故令病水假如小便自利此亡津液故令渴越婢加朮湯主之即越婢湯加白朮心水者其身重而少氣不得臥煩而躁其人陰腫嘉言曰水在心之部則鬱心火明灼之化肝水者其腹大不能自轉側脅下腹痛時時津液凝生小便續通水在肝之部則鬱肝木發生之機肺水者其身腫小便難時時鴨溏水在肺之部則孤陽竭於外其魄獨居脾水者其腹大四肢苦重津液不生但苦少氣小便難水在脾之部則陰竭於內而穀精不布腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦大便反堅水在腎之部不但諸陽退伏即從陽陰亦退伏孤陽獨居於下而隔絶也諸病水者渴而下利小便數者不可發汗又云諸有水者腰以下腫當利小便腰以上腫當發汗乃愈以上仲景治水諸法皆以脈病為本量輕重虛實而施治如黃耆白朮乃實脾溫衛以行其水也麻桂石膏和其營衛之偏以行其水也附子細辛溫經扶陽以行其水也較之後人宜攻其水何啻天壤丹溪云因脾虛不能制水水溢妄行當以參術補脾氣得實則自能健運自能升降運動之樞轉則水自行非五芩之行水也按丹溪治水諸法專以補為主實王道也若水氣淫溢滔天洶湧者必欲行水來掩土之法殆矣仲景諸方行水以救土其功為何如耶腫病不一或偏腫或四肢腫或頭面腳腫皆為水氣然有陽水陰水之分或風虛風濕之異不可不辨也遍身水腫煩渴小便赤澀大便多閉此屬陽水導水茯苓湯赤茯苓麥冬澤瀉白朮桑皮紫蘇檳榔木瓜大腹皮陳皮砂仁木香燈心重者可用藥五兩再加麥冬至二兩五錢用水一斗煎至一大碗重則疏鑿飲子利之以通為度亦有煩渴而大便已利者此不可更利宜五茯苓散加木通腹皮之類遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀此屬陰水宜實脾飲厚朴白朮木瓜大腹皮茯苓附子木香炮姜草果甘草姜棗小便多少如常有時赤有時不赤至晚則凝赤卻無澀滯者亦屬陰也不可遞補木香流氣飲見底門繼進復元丹按復元丹較實脾飲更多桂心吳萸芋川椒茴香當裁酌用若大便不溏氣急脹滿宜四磨飲下黑錫丹按陰水者少陰腎中真陽衰北方之水不能封蟄收藏而泛濫無制耳倘腎氣不溫滅頂之凶實脾飲實土以提水總屬第二義復元丹補脾溫腎兼行較之稍勝然不用茯苓仍用厚朴檳榔終落時套四肢腫謂之肢腫宜五皮飲大腹皮赤茯苓皮生薑皮陳皮桑白皮各錢半按五皮飲今人以為通治水腫之法蓋能宣行脾肺之氣兼利水耳加薑黃木瓜面獨腫蘇子降氣湯兼氣急者尤宜加磨沉香汁有一身之間惟面與兩腳浮腫早則面甚暮則腳甚此風濕也當辨別陰陽辨其大小便之利否用除濕湯五皮飲或蘇子降氣湯選用面目手足俱腫導滯通經湯木香白朮桑皮陳皮各五錢茯苓一兩感濕而腫者其身雖腫而自腰至腳又重腿脹滿尤甚於身氣或急或不急便或溏或不溏宜通利小便為佳胃苓湯加木瓜防己腹皮再當詳寒濕熱分治因氣而腫者其脈沉伏或腹脹喘急氣分香蘇飲桑皮陳皮茯苓香附各一錢蘇葉錢半桔梗枳實各五分草果錢半飲食所傷而腫或胸滿或噯氣宜消導寬中湯白朮枳實厚朴陳皮製半夏楂肉神麯麥芽萊蔔子姜不服水土而腫者胃苓湯加味五皮飲即五皮飲加五加皮木瓜防己有患生干瘡用藥太早致遍身腫宜消風敗毒散即人參敗毒散加防風荊芥再當分其熱勝濕勝脾虛血虛施治肺經有濕遍身腫脹者續隨子丸人參防己赤茯苓檳榔續隨子海金沙各五錢葶藶子二兩棗肉丸以上數條為有餘之症大約病後浮腫此係脾虛宜加味六君子湯白朮三錢人參黃耆各錢半茯苓三錢陳皮半夏曲白芍木瓜炙草大腹皮姜棗有脾肺氣虛不能通調水道者補中益氣湯補脾肺六味丸補腎挾陽虛惡寒脈沉細者加附子有心火克肺金不能生腎水以至小便不利而成水症者用人參平肺散以治肺滋腎丸以滋小便若腎經陰虧虛火爍肺金而小便不生者用六味地黃丸以補腎水用補中益氣湯以培脾土脾肺之氣交通則水穀自化二經既虛漸成水脹又誤用行經分利之藥以致小便不利喘急痰盛以成蠱症宜加味腎氣丸主之以上數條為不足之症不足者正氣不足也有餘者邪氣有餘也邪之所湊其氣必虛故以不足之法治有餘則可以有餘之法治不足則不可慎齊云凡腫脹之症先從腳下腫者濕熱在下宜先溫補脾肺五六劑次以補中益氣湯和之後以五苓散利之先從身上腫者濕熱在上宜先利其濕熱一二劑口渴加紫蘇次用補脾胃藥大抵脈浮而無力當汗用五積散脈沉而無力當用四君子和中丸海藏水氣問難云身半以下腫者當利小便身半以上腫者當發汗如肌肉之外皮膚之裡自手至足一身皆腫當作何治答曰亦宜汗之也與身半以上同法嘉言曰水腫有當發汗散邪者不效兼實其衛致水隨汗浸淫皮腠不復順趨水道其害最大疏鑿飲子治通身水腫喘呼氣急煩躁口渴二便不通服熱藥不得澤瀉商陸根赤豆羌活大腹皮椒目木通秦艽茯苓皮檳榔各一錢祕方石葦散利小便甚捷石葦醋炒二錢楊樹簟炒七錢鬱金酒二錢木香三錢蝸牛燒灰五分麝香五釐一方用石葦木香二味為末白湯下一錢二分蒼戟丸治水腫行水燥脾大戟二兩蒼朮二兩沉香五錢陳米糊丸酒下二錢一法用陳大麥卡復煎為末每服二錢酒下一方用大戟二兩打碎蒼朮四兩米泔水浸切片同一處入罐內加水煮三炷香取出去大戟將術曬乾又浸又曬無藥為度則以蒼朮一味為丸或研末酒送下忌鹽醋甜物百日方可以上五方皆劫劑也非濕熱痞甚痰涎阻氣及壯熱者不可輕用嗚呼世俗之醫因病急求一時之效以破氣去水為功不知過一二日則病復至而不可救藥矣萬不得已亦當以參術補氣之藥以補其後至舟車神佑諸法一概不選用庸俗以至欲求近功以殺人也薷術丸治風水氣水暴水通身腫脹服至溲利為效用香茹一斤水一斗煮爛取汁漫火熬成膏加白朮末八兩為丸如桐子大每服一二十丸日五服夜二服沉香琥珀丸治一切水腫急難小便不通琥珀杏仁紫蘇赤苓澤瀉各一錢葶藶郁李仁沉香各錢半陳皮防己各七錢共為末麝香為衣每服二十五丸加至五十丸人參湯送下量病人虛實加減烏鯉湯治水氣四肢浮腫烏鯉魚一尾赤小豆桑白皮白朮陳皮各一錢蔥白五根用水同煮先吃蔥後飲藥以上三方雖專以利水為上較上諸方相去天壤故選録之調營散治瘀血留滯血化為水四肢浮腫皮肉赤紋名曰血分蓬朮川芎當歸前胡白芷檳榔赤芍桑皮瞿麥大腹皮赤苓葶藶各一錢大黃錢半細辛官桂炙草各五分姜三片棗三枚按瘀血化水血赤縷外現不去其水勢必不瘀之血亦同感化矣此方只作一服原不欲多用倘服後不減未可再服且再用活血補氣之藥調三五日徐進此藥虛甚者必參附合用得大力主持其間驅逐之始能建功也診目窠微腫如臥蠶之狀曰水足脛腫曰水頸腫喘急曰水脈得諸沉當責有水身體腫重水病脈出者死按少陰腎水本沉忽轉沉之烏有而反外出者則主死也如風水皮水等症脈之浮大且洪者豈亦主死耶陽水兼陽症脈必沉數陰水兼陰症脈必沉遲水病脈得洪者可治微細者不可治又云浮大輕者生沉細虛小者死又云實者生虛者死唇黑則傷肝又云人面黑者肝絶也缺盆平則傷心又云兩手無脈心絶也臍出則傷脾足心平則傷腎又云足腫如瓜者腎絶也背平則傷肺又云兩眉窔起肺絶也凡此五傷必不可治從四肢歸入腹者大便溏泄者男從腳上起女從面上起皆不治慎齊云以手按之隨手即起者水也頃時而起者氣也成窠不起者濕也臌脹一名蠱脹即單腹脹也六元經紀論云脾乃陰中之太陰同濕土之化脾濕則臌滿食不化天為陽為熱主運化也地為陰為濕主長養也無陽則陰不能生化故云臟寒生滿病調經篇云因飲食勞倦傷脾胃始受熱中未傳寒中皆由脾胃之氣虛弱不能運化精微而致水穀聚而成脹滿經云腹滿䐜脹支膈胠脅下厥上冒過在足太陰陽明乃寒濕鬱遏也脈經云胃中寒則脹滿又云諸脹腹大皆屬於熱者何哉此乃病機總辨假令外傷風寒有餘之邪自表轉里寒變為熱而作胃熱腹滿仲景以大承氣湯治之亦有膏粱之人濕熱鬱於內而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治者宜詳辨之靈樞脹論謂五臟六腑各有脹其脹皆在臟腑之外排臟腑而郭胸脅脹皮膚胸脅者臟腑之郭也各有界畔各有形象營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹脾脹者善噦四肢煩冤臥不安體重不能勝衣胃脹者胃脘痛鼻聞焦臭妨於食大便難肺脹者虛滿而喘咳大腸脹者腸鳴而痛濯濯冬日重感於寒則餐泄不化腎脹者腹滿引背央央然腰背痛膀胱脹者少腹滿而氣癃肝脹者脅下滿而痛引少腹膽脹者脅下痛脹口中苦善太息三焦脹者氣滿於皮膚中輕輕然不堅心脹者煩心短氣臥不安小腸脹者少腹䐜脹引腰而痛夫諸脹者皆因厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合而為脹也故凡治是病必會通聖經諸條之旨然後能識臟腑之部分形症邪氣之所自來縱腹脹滿卒難究竟者亦必有脹甚之部與病先起處即可知屬何臟腑之氣受邪而不行者為先為後及何中焦氣交之分於是轉運不前氣分壅聚通腹脹滿也如脾胃受邪便先是胃脘心下痞氣漸積為通腹脹滿也腹屬陰也屬脾胃者飲食少納屬他臟腑者則飲食如常由他臟腑而病及脾胃者則飲食亦少也此亦可驗又須分其表裡淺深脹在皮膚筋絡之間者飲食如常其在腸胃肓臟之間則飲食減少其氣壅塞於五臟則氣促結而病乃危矣是故病在表者易治入腑者難治入臟者不治更要審其虛實寒熱其臟腑之氣本盛被邪填塞不行者為實其氣本不足因邪可壅者為虛實者祛之虛者補之寒者熱之熱者寒之結者散之留者行之邪從外入內而盛於中者先治其外而後調其內陰從下逆上而盛於中者先抑之而後調其中陽從上降下而盛於中者先舉之而後調其中使陰陽各歸其部故內經治法謂平治權衡去菀陳莝開鬼門潔淨府宣布五陽巨氣乃平此之謂也節録王宇泰證治淮繩東垣云濕熱病為脹右關脈洪緩而沉弦脈於上是風濕熱三脈合為病也是脾胃之令不行陰火亢盛乘於脾胃則左遷而陽道不行是六腑之氣已絶於外火盛能令兩實風氣外絶風氣外絶者蓋穀氣入胃清氣營氣不行便是風氣也經云虛則乘其所勝土不勝者肝之邪也是脾土不足水火大勝也經云濁陰出下竅濁陰走五臟濁陰歸六腑此平康不病之常也反此則為脹也陰陽應象論云清氣在下則生飧泄濁氣在上則生䐜脹此陰陽相反作病之逆從也又云飲食不節起居不時者陰受之則入五臟入五臟則䐜滿閉塞調經篇云下脘不通則胃氣熱熱氣熏胸中故內熱下脘者幽門也幽門不通上衝吸氣沖其吸入之氣不得下歸於肝腎為陰火動而相拒致隔咽不通濁陰之氣不得下降而大便乾燥不行胃之濕與客陰之火俱在其中則腹脹作矣治在幽門使幽門通利泄其陰火潤其燥血則䐜滿腹脹自去經云中滿者瀉之於內是也按東垣丹溪二公所論皆是濕熱為病與寒生滿病者不可同日而語矣故治法皆云瀉之於內也脹而大便燥結脈沉之洪緩浮之弦者宜沉香交泰丸沉香橘紅白朮各三錢厚朴五錢吳芋枳實青皮木香茯苓澤瀉各二錢大黃一兩酒炒湯浸蒸餅丸桐子大每服五十丸加至七八十丸溫湯下微利為度按中滿者瀉之於內謂脾胃有病當上下分消其濕下焦如瀆氣血自然分化不待泄滓穢如或大實大滿大小便不通從權以寒熱藥下之或傷酒面之物膏粱之人或食即便臥使濕熱之氣不得施化致令腹中脹滿此脹亦是熱脹分消丸主之中滿分消丸治熱臌脹氣脹有寒者不可服黃芩一兩二錢黃連五錢薑黃白朮人參炙草豬苓各一錢茯苓乾薑砂仁各二錢製半夏枳實各五錢厚朴一兩知母四錢澤瀉陳皮各二錢湯浸蒸餅丸桐子大每服百丸熱湯下中滿分消湯治中滿寒脹寒疝大小便不通陰燥四肢厥逆足不收食入反出下虛中滿中寒心下痞黃耆吳萸厚朴草果黃柏各五分益智仁半夏茯苓木香升麻各三分人參青皮當歸黃連澤瀉生薑麻黃柴胡乾薑川烏蓽澄茄按東垣此方云治寒脹而反用黃連黃柏者取其瀉陰火而制其衛氣也其書症云大小便不通等證云云故用藥如是苟脾胃氣虛寒濕為邪大便溏泄小便自利者其用藥必不如是用者細審之中滿腹脹者內有積聚堅硬如石其形如盤令人不能坐臥大小便澀滯上氣喘促面色萎黃通身虛腫廣朮潰堅湯主之廣朮黃連柴胡生草神麯澤瀉陳皮吳萸青皮升麻黃芩草蔻厚朴益智各五分半夏葛根各七分木香順氣湯治勞役飲食失節加之憂思氣結心腹脹滿旦食不能暮食兩脅刺痛診其脈弦而細至夜濁陰之氣不降䐜滿尤甚大抵陽主運化飲食勞倦損傷脾胃陽氣不能運化精微聚而不散故為脹滿經云留者行之結者散之以柴胡升麻之苦辛行少陽陽明二經發散清氣運行陽化為君以生薑半夏草蔻益智之甘辛大熱消散中寒為臣以厚朴木香蒼朮青皮辛苦大溫通順滯氣以當歸人參甘溫調和營衛滋養中氣濁陰不降宜以苦味吳茱萸苦熱泄之也氣之薄者為陽中之陰茯苓甘草澤瀉鹹平氣薄引濁陰之氣自上而下故為佐氣味相合使清濁升降各安其位也丹溪云脾主坤靜之性而有乾健之運故能使心肺之陽降肝腎之陰升而成天地之交泰是為平人也今也七情內傷六淫外感飲食失節房勞無度致脾土之陰受傷轉運之權失職胃雖受谷不能運化故陽升陰降而成不交之痞清濁相混隧道壅塞而為濕濕熱相生遂至脹滿經云臌脹是也以其外雖堅滿中空無物有似於鼓以其膠固難治又名曰蠱若蟲浸蝕而有蠱之義專宜補其脾又須養金以制木使脾胃無賊邪之害滋水以制火使肺得清化之權此治濕熱之法卻鹹味斷妄想無有不安者醫者不察病情病者苦於脹滿喜行利藥而求通快不知寬得一日半日其脹愈覺甚而病邪愈甚矣真陽傷矣按內經胃中虛冷或以旦食不能暮食由至陰居中五陽不布然也今丹溪乃云濕熱相生則固無害寒者歟曰此則有其一端耳至其大法當詳之全經是皆大意至養金制木滋水制火之說其害未免執偏夫制火固可保金獨不慮其害土乎惟屬熱者宜之苟涉陽虛者為害最大不可不辨也生生子曰脹滿之疾穀食不消小便不利腹皮脹急而光內空空然如鼓是矣俗知謂之蠱脹不察其致者有由也內經曰脹取三陽三陽者足太陽寒水膀胱經也靈樞曰下焦溢而為水靈蘭祕典曰膀胱者州都之官津液藏焉氣化則能出矣歷考三書可也小便之不利由下焦之原氣虛寒以致濕氣壅遏皮里臟外之間不得發越勢必腫滿是腫滿之疾起於下元虛寒也若非溫下元則小便何能獨利且夫人之胃如釜甑然釜底火旺則熱氣熏蒸甑物易熟若徒有水而無火則無氣上升物何由熟即此可以例觀矣故治脹滿先宜溫補下元使火氣盛而濕氣蒸發胃中溫暖穀食易化則滿可寬矣夫清氣既升濁氣自降濁氣降則為小便也小便利則脹豈有不消者乎經謂地氣上為云天氣下為雨惟此氣流行所為云為雨今之醫者一遇此疾曰內經有言諸濕腫滿皆屬於脾土土虛則濕停濕停則滲透肌膚遍身腫滿不可不通利也輒用利小便及補中之劑如五苓散胃苓湯加木通車前子大腹皮滑石之類在法未為乖謬然服之愈多而小便愈少腫脹愈急何哉不溫補下元而徒以通利之藥施之果若此豈惟不效而下元益虛真氣益弱死期且至安望其有瘳乎余嘗究心靈素參匯易理憬然有得於中且試之病者隨試輒效筆之於冊以公我同志附壯元湯治下焦虛寒中滿腫脹小溲不利上氣喘急陰囊兩腿皆腫或面浮氣也人參白朮各二錢茯苓破故紙各二錢桂心大附子乾薑砂仁各五分陳皮七分水煎食遠服有痰加半夏一錢喉中痰聲咳嗽加桑白皮一錢腳跗面腫加苡仁四錢中氣不轉運不知飢加厚朴木香氣鬱不舒加沉香烏藥臨服磨入氣虛息短加人參至五錢大附子至錢半汗多者加桂枝白芍酒炒各八分若夏月喘乏無力或汗多者加麥冬一錢五味子十一粒夜夢不安者加遠志一錢兩脅氣硬面浮加白芥子紫蘇各五分如身重不能轉功加茅朮一錢濕盛加桑白皮赤小豆嘉言曰脹病與水病非兩病也水氣積而不行必至於極脹脹病不外水裹氣結血凝而以治水諸法施之百無一愈者失於師承無人耳仲景謂水病氣分心下堅大如盤邊如旋盤水飲所作然此脹病豈無血分心下堅大如盤者乎多血少氣豈無左脅堅大如盤者乎多氣少血豈無右脅大如盤者乎故大病之人凡有癥瘕積塊痞塊即是脹病之根日積月纍腹大如箕腹大如甕是名單腹不是水氣散於皮膚四肢也仲景所謂石水者指此也胸中空曠氣食尚可從旁轆轉腹中大小腸膀胱逼處雖未立法然而比類推其法不啻詳矣仲景於氣分心下堅大加盤兩出其方一方治陰氣結於心下用桂枝去芍藥加麻黃附子細辛湯一方治陽氣結於心下用枳朮湯夫胸陽位尚分陰氣陽氣而異其治況腹中至陰之處可不從陰獨治之乎陰氣包裹陰血陰氣不散陰血且不露可驅其血乎舍雄入九軍單刀取勝之附子更待何藥可散其陰氣破其堅壘乎推之兩脅皆然但分氣血陰結之凝甚而水亦從其類也按嘉言之論臌脹專主水裹氣結血凝凡有癥瘕積塊即是脹病之機可謂發明內經者矣其曰陰氣包裹陰血此誠發前人所未發然與朱李二公之論若有相悖何耶二公所論專言五臟賊克本氣自病即濕熱為邪亦從本元中來故曰空中無物有似於鼓即今之氣虛中滿是也嘉言所論乃屬有形為病其曰陰氣包裹陰血而陰氣雖屬無形而陰血又屬有形矣故其為治各自不同即其病形亦必自異其在智者臨症細辨之醫貫氣虛中滿論曰中滿者證與臌脹水腫無異何故屬之氣虛請得明言之否曰氣虛腎中之火氣虛也中滿者中空似鼓虛滿非實滿也大略皆脾腎兩虛所致海藏曰夫水氣者乃胃土不能制腎水之逆而上行轉入於肺故令人腫治者惟知泄水而不知益胃故多下之強令水出不依天度流轉故胃愈虛食不知味則發而不能制也莫若行其所無事則為上計何今之人不知此等高論舉手便以為水腫用內經去菀陳莝開鬼門沽淨府之法治之如舟車丸禹功散之類若真知其為水濕之氣客於中焦侵於皮膚皮膚中取水晶之光亮手按之隨按隨起者以前藥一服而退今俗人所謂黃病又有曰何白脹者即此是也若久病大病後或傷寒瘧痢後女人産後小兒痘後與夫原氣素弱者概以前法施之脾氣愈泄愈不可復救故治腫者先以脾土為主須以補中益氣湯或六君子湯溫補之俾脾土旺則能散精於肺通調水道下輸膀胱水精四布五經並行矣或者疑為喘脹水滿而又加純補之劑恐益脹滿必補藥中加行氣利水之品方妙此說似得病情終非大方家體蓋肺氣既虛不可復行其氣腎水已衰不可復利其水純補之劑初時服下似覺不快過時藥力得行漸有條理矣至於補腎以治腫其說難明蓋禹之治水行其所無事也若一事疏鑿則失之矣治腎水者牽牛大戟粗工之小知正禹之所惡也間有用五苓五皮者以為中正亦轉利轉虛腎氣愈衰而愈不能推送矣故須用補腎經曰腎開竅於二陰腎氣化則二陰通二陰閉則胃腹脹故曰腎者胃之關關門不利故聚水而從其類也又曰腎主下焦三焦者決瀆之官水道出焉必待三焦之火化始能出也其三焦之經在上者布膻中散絡心包在下者出於委陽上絡膀胱上佐天道之施化下佐地道之發生與手厥陰為表裡以應諸經之使者也是故腎虛者下焦之火虛也宣明五氣篇云下焦溢而為水以瀉注之所氣窒而不利則溢而為水者也經曰三焦病者腹氣滿小腹尤堅不得小便溢則水留而為脹惟張仲景制金匱腎氣丸補而不滯通而不泄誠治腫之神方薛立齊屢試效驗詳載醫案余依其醫案試之甚驗故詳著焉世有患此幸無棄置也腎氣丸白茯苓三兩附子五錢牛膝一兩肉桂一兩澤瀉一兩車前子一兩山藥一兩山萸肉一兩丹皮二兩熟地四兩又有一等純是陰虛者其症腹大臍腫腰痛兩足先腫小水短澀喘嗽有痰不得臥甚至頭面皆腫或面赤口渴但其人飲食知味大便反燥醫見形腫氣喘水症標本之疾雜用利水之劑而益甚殊不知陰虛三焦火旺與衝脈之屬火者同道而上由是水從火溢上積於肺而嗽甚則為喘呼不得臥散聚於陰絡而為跗腫隨五臟之虛者入而聚之為五臟之脹皆相火泛濫其水而生病也以六味地黃加表冬五味大劑服之豫曾用之未效加牛膝車前應驗親試有驗故録又有一等火鬱者口苦脅痛惡寒目黃面黃嘔酸等症須用逍遙散舒其鬱繼以六味丸滋其陰而禁用分利此症最難治當參丹溪諸法蓋病形未見人皆忽之及形已見則臟腑已敗矣故難治也周慎齊云臌脹者因其中空無物皮急如鼓脹則排臟腑郭胸脅形皮膚也經云夫脹者皆在於臟腑之外脹皮膚然脹有氣腫水腫食積停痰陽陰腫之不同然七情氣滯食積死血悉能為腫治必詳審更分虛實虛脹時滿時減按之虛軟不痛實脹常滿不減按之堅硬而痛積滯腹中有挾血虛朝寬暮急氣虛朝急暮寬氣血俱虛朝暮見急而不痛初起因食積痰氣暴腫或大滿大實氣滯痞悶飲食又減脈浮洪大者非疏利不可後方宜調養十材云陰陽虛實不可不辨大抵陽症必熱熱者多實陰症必寒寒者多虛先脹於內而後腫於外者為實先腫於外後脹於內者為虛小便黃大便祕結為實小便清白大便溏泄為虛滑數有力為實弦浮凝細為虛色紅氣粗為實色悴氣短為虛實者腹中常脹外堅內痛按之下陷法當疏利虛者時脹時減氣虛流滯按之則濡法當溫藥和之凡諸實症六淫外客或飲食內傷陽邪急速其至必暴每成於數日之間若是虛症情志多勞或酒色過度日積月纍其來有漸每成於經月之後然治實頗易理虛恆難虛人氣脹者脾虛不能運氣也虛人水腫者土虛不能制水也水雖制於脾土實則統於腎腎本水臟而元陽寓焉命門火衰既不能自制陰水又不能溫養脾土則陰不從陽而精化為水故水腫之證多屬火衰也其餘諸證察其實者宜清陽明反掌收功苟涉虛者溫補脾腎漸次康復其有不大熱者亦不大虛者先以清利見功繼以補中調攝又有標實而本虛者極為危險在病有臌脹與蠱脹之殊臌脹中空無物腹皮臌急每屬於氣也蠱脹者中空有物形充大非蟲即血也女科有氣分血分之殊氣分者心胸堅大而病發於上先病水脹而後經斷血分者血結胞門而發病於下先因經斷而後水脹在治法有理肺理脾之殊先喘而後脹者治在肺先脹而後喘者治在脾凡脹病至極必喘喘至極必脹以二症每相因而成也以上諸法此其大略也此水腫臌脹並論腫脹有五一曰脹滿謂中脘上脹悶漸漸而起乃陽明經清濁壅滯宜分氣飲分氣飲治中脘以上脹滿妨悶茯苓一錢梔子一錢紫蘇八分白朮五錢枳殼一錢炒蔻仁研一錢木通七分大腹皮八分青皮六分木香四分食遠服加姜水煎二曰臌脹獨肚腹團團而脹大也此乃火剋金也脈來實大而腸燥急宜黃連厚朴湯加減黃連厚朴湯治單腹脹而便堅脈實大洪數者乃心脾二經積熱剋制金水而肺胃清氣不升而失下潤之化也黃連酒炒一錢楂肉連翹陳皮山梔各一錢柴胡五分厚朴一錢六一散二錢半姜水煎二更時熱服醫貫此病用六味地黃加五味大劑服之此症絶是陰虛或兼腰痛小溲短澀喘咳有痰不得臥甚則頭面皆腫或面赤口渴但其人知味大便反燥皆相火泛濫其水而生病也治當養陰不可燥劑三曰云云見會理風寒暑濕脹藿香正氣散七情脹五膈寬中散飲食所傷脾胃虛弱以致水穀聚而不化此寒濕鬱遏而脹香砂調中湯藿香五錢砂仁五錢蒼朮一錢厚朴陳皮半夏青皮茯苓枳實各一錢甘草三分生薑大怒而脹分心氣飲蘇梗青皮芍藥大腹皮陳皮各一錢官桂六分赤茯苓桑白皮燈心生薑憂思過度而脹紫蘇子湯蘇子大腹皮草果半夏厚朴木香陳皮木通白朮枳實人參五分甘草三分姜五片食遠服濕熱內盛心腹脹滿小便不利大便滑泄及水腫大橘皮湯橘皮厚朴各錢半豬苓澤瀉白朮各二錢二分蒼朮藿香檳榔赤苓陳皮製半夏山楂茯苓木香滑石姜三片失飢傷飽痞悶吞酸早食不能暮食名谷脹大忌香散三稜蓬朮青皮半夏曲陳皮藿香桔梗枳殼香附益智仁各錢半甘草姜棗雞矢醴治心腹脹滿旦食不能暮食其脈沉實散病名谷脹用羯雞矢白半升炒以好酒一斗煎至一半每服一盞五更溫服脾土受濕不能制水水漬於腸胃溢於皮膚漉漉有聲怔忡喘息名水脹大半夏湯半夏陳皮茯苓桔梗檳榔甘草生薑有因積聚相攻或疼或脹者初用七氣消聚飲香附醋炒錢半青皮醋炒蓬朮醋炒三稜醋炒枳殼麩炒木香砂仁各一錢厚朴陳皮各一錢二分甘草四分姜日久脾胃虛弱而脹者參朮健脾湯人參茯苓陳皮半夏姜砂仁厚朴白朮炙草少佐酒導藥脹是脾虛不能運化或肝木為濕熱蘊滯者小溫中丸陳皮半夏茯苓神麯各一兩香附針砂醋炒各一兩五錢苦參川連各五錢甘草三錢用醋水各半打糊為丸每服七八十丸白朮六錢陳皮一錢姜一片煎湯下虛者人參湯下食啖生冷過飲寒漿有傷脾胃遂成脹滿有妨飲食甚則腹中痛強中湯人參青皮丁香各二錢白朮五錢附子草果炮姜各一錢厚朴炙草嘔加半夏加生薑紅棗煎服煩躁漱水迷妄驚狂痛悶喘惡虛汗厥逆小便多一云赤大便血一云黑名血脹人參苓歸湯人參辣桂靈脂炒各二錢半烏藥蓬朮木香砂仁炙草各五錢川芎當歸半夏各七錢半姜棗婦人經脈不利血化為水流走四肢悉能腫滿名血分或皮上見青紫筋小溲反利脈芤澀用人參丸人參當歸大黃蒸桂心瞿麥赤芍白茯苓各五錢葶藶一錢蜜丸如梧子大每服十五丸加至三十丸米飲湯送下以上治標邪為脹初起壯實者宜之勞倦所傷脾胃不能運化而脹者補中益氣湯氣不運者加厚朴以運氣腹中奔悶者此非脹滿乃散而不收用白芍藥以收之收散之劑生死所繫最宜細審之病久脾虛中滿或服通利藥過多或瘧痢後因虛致脹者大宜補胃用參苓白朮散為君蒼朮乾薑肉桂砂仁吳萸以運化佐以神麯蘿蔔子蘿蔔子非氣虛者所宜以消臌傳化少加青皮以制肝氣鬱加沉香氣下陷加升麻柴胡小便不利加車前子澤瀉虛者加熟附或香參散一切疏氣散堅滲泄之藥如厚朴腹皮車瀉曲柏楂在所禁也此治虛脹之大法和中丸治臌神效屬虛寒所宜濕熱甚者不可服周慎齊方乾薑四兩切片分四分一分用人參一兩煎湯拌炒汁盡一分用青皮煎汁拌炒一分用紫蘇煎湯拌炒一分用陳皮煎湯拌炒各炒焦要炒黑肉桂二兩一分用益智仁三錢煎湯拌炒一分用小茴香二錢同煎一分用破故紙同煎吳萸一兩一分用苡仁一兩煎湯炒一分用鹽三錢同浸炒共為末蘇葉煎湯打神麯糊丸隨症輕重作湯送下虛者人參湯下此方能上通下達安胃和中倘胸膈飽悶服之恐血上行加蘇梗血自下達虛加人參噁心加半夏隨症加減無不神驗但為末名和中散補中湯入和中散再加蘇梗杏仁誠上通下達之妙劑也禹餘糧丸為治臌脹之要藥昔人用之屢效但藥味峻猛必以補氣血之藥助之庶可奏功若脈見凝數症挾虛熱者不可概用導氣丸取諸峻藥同炒用其氣而不用其質消堅破結亦能斬關而入元氣未甚虛者方可用之病久憊甚者不可妄用也蝦蟆豬肚丸治單腹脹用蝦蟆一隻去腸肚以胡椒一錢入口內豬肚包縫煮爛湯半碗去蝦蟆收豬肚搗爛為丸每用湯一杯送下丸藥一法用人參固元氣不見水葫蘆同煎服氣即消佐金平肝健脾丸治黃疸脹氣脹水腫黃連吳萸制各一兩皂礬八兩三品研勻以草紙包緊米醋浸透入炭火中上以炭火多加煅過一夜次日拔火炭好好取起已化硃色如未變色再如前法然後研末聽用加木香五錢山梔炒一兩蒼朮二兩扁豆五錢草果三錢檳榔五錢人參五錢莪朮一兩厚朴一兩川芎七錢山楂一兩甘草二錢陳皮一兩香附一兩用紅棗飯上蒸熟去皮核加元米少許和前藥丸如桐子大曬乾每服三四十丸食遠米湯下此丸不特水氣疸三種可治凡黃胖脾胃不健皆可治如左脅有塊或是瘀血加乾漆桃仁研各一兩丸服蒜肚丸治單腹脹用豬肚一個大蒜頭十個砂仁一兩入肚中以線縫好煮至肚爛為度服之泄氣即愈亦治腸覃蠱脹單方田螺水漂加香油一盞於水內其涎自出取其涎曬乾為末每服不過三分酒調服下其水自小便而下其氣自大便而出身腫再補脾胃小調經散治婦人血分症先經斷而後四肢腫滿小便不利者血瘀水道以通經為主白芷五錢官桂沒藥甘草各三錢赤芍細辛當歸元胡各二錢琥珀一錢另研麝香一分共研為細末每服二錢陳酒下其效如神腸覃寒氣客於腸外與衛氣相搏氣不得榮因有所繫癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離歲按之則堅推之則移月事以時下此其候也晞露丸木香通氣散主之晞露丸三稜莪朮二味各一兩煎用酒浸入巴豆三十粒同炒深黃色去巴豆不用乾漆炒煙盡川烏炮各一錢硼砂四兩另研輕粉一錢另研茴香鹽水炒青皮雄黃另研穿山甲炒各一錢麝香另研五分薑汁煮糊丸如梧子大每服二十丸至三十丸止薑湯過酒亦可空心服木香通氣散木香戎鹽炒三稜炮各五錢厚朴薑製一兩枳實麩炒炙草各三分乾漆炮莪朮各二錢共為末每服三錢薑湯送下石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀加懷子月事不以時下皆生於女子可導而下此即難經所謂八瘕之類服見睍丸炮附子四錢鬼箭羽紫石英各三錢澤瀉肉桂元明粉木香各二錢檳榔二錢半血竭錢半另研水蛭炒煙盡一錢三稜五錢大黃二錢二味用酒同浸一宿焙桃仁三十粒共浸藥酒中數日然後打糊丸每服三十丸淡醋湯下食前服和血通經湯亦可服當歸三稜各五錢廣朮炮木香肉桂各三錢紅花貫仲蘇木各二錢血竭另研一錢共為細末和勻每服三錢熱酒調下食前服診脈盛而緊大堅以澀遲而滑佳唇偏舉者脾偏頃脾偏頃者則脹滿關上脈虛則內脹脹脈浮大洪實者易治沉細凝弱者難治腹脹身熱脈大是逆也如是者不過十日而死矣脹或兼身熱或如瘧狀皆不可治纍驗此指正虛本病而言腹脹大四末清脫形泄甚是逆也如是者不及一時而死矣腹脹大便血其脈大時絶是逆也治腫脹方王達官傳來防風沉香鬱金白蔻仁麥芽白芥子製半夏淮牛膝烏藥豬赤苓萆薢前胡橘皮杏仁萊蔔子木通澤瀉厚朴枳實香附蘇子神麯桑白皮楂炭姜皮大腹皮以上分兩隨病制宜另用紫蘇一兩赤苓皮一兩荊芥一兩通草一兩冬瓜皮一兩煎湯並有服五六劑愈者有服十餘劑愈者有服二十餘劑而愈者復元丹治脾腎俱虛發為水腫附子炒一兩白朮炒焦肉桂吳萸川椒茴香木香厚朴澤瀉肉果煨各五錢茯苓一兩五錢共為末陳米飲糊丸桐子大每服五七十丸紫蘇湯或砂糖湯下除濕湯半夏曲厚朴蒼朮各二兩藿香葉陳皮茯苓各一兩炙草七錢白朮一兩每服四錢姜七片棗三枚人參平肺散桑白皮二錢炒知母炙草茯苓人參地骨皮天冬各一錢青皮六分陳皮五味二十粒生薑滋腎丸即益陰腎氣丸熟地三兩酒煎生地四兩酒製丹皮當歸尾五味子山藥山萸柴胡各五錢茯苓澤瀉各二錢五分共為末蜜丸辰砂為衣每服五七十丸空心淡鹽湯下加味腎氣丸熟地山萸茯苓丹皮山藥澤瀉各三兩肉桂附子各二兩車前子牛膝白朮炒茴香炒各二兩五積散白芷炙草茯苓半夏當歸川芎肉桂白芍枳殼麻黃陳皮桔梗厚朴乾薑蒼朮姜三片蔥白三根臌脹一名蠱脹臌者鼓也中空無物有似於鼓故以名之若蠱乃三蟲食血之象以其膠固難通亦有蟲血錮結而為蠱者大法要分虛實寒熱新久氣血之不同導滯通幽湯治幽門不通上衝吸門噎塞不開氣不得下大便難脾胃初受熱中多有此症治在幽門以辛潤之歸身升麻梢桃仁泥炙草各一錢紅花少許生熟地各五分煎調檳榔末五分服潤腸丸治胃中伏火大便祕澀或乾燥不通全不思食乃風結血閉皆令閉塞須潤燥和血疏風則自然通矣羌活當歸梢大黃煨各五錢麻仁另研桃仁另研共為末蜜丸每服三五十丸空心白湯下聖濟方治三焦咳嗽腹滿不欲食氣不順仙靈脾覆盆子一兩五味子一兩炒為末蜜丸桐子大每服二十丸薑茶湯下香參散治脾虛脹滿人參一兩沉香二錢半茯苓桔紅各五錢附子一錢一分新瓦上焙為細末每服五錢水煎服鼓脹方大蝦蟆一隻新瓦兩片相合鐵線纏定內外鹽泥固濟慢火煅存性為末溫酒調服三五錢鼓脹神方兒龍草根野川芎野芹菜根葉白馬蘭車前草四味連根葉等分打汁大酒沖晚服服至八日有效治腫脹丸方真蒼朮一兩厚朴八錢陳皮八錢山楂二兩皂礬二兩煅白色香附八錢棗肉丸白湯下忌鹽永百日方可嘔吐嘔吐噦皆屬於胃胃者總司也嘔吐皆有聲有物但物出為吐漸出為嘔有聲無物為乾嘔但聲如干嘔怯弱濁惡而長者為噦嘔輕而噦重也又嘔主陽明吐主太陽噦主少陽三者有氣分多少之分焉陽明多氣多血故嘔屬之太陽多血少氣故吐屬之少陽多氣少血故噦屬之丹溪云河間謂火氣炎上特一端耳有胃中有熱膈上有痰者有痰隔中焦食不得下者有寒氣鬱於胃口者有食滯心肺之分新食不得下而嘔者有七情鬱結為關格者有風邪入胃者有胃虛久嘔而不得納穀者但火與痰作嘔吐者為多治法胃中有熱膈上有痰者噁心悶痞嘈雜煩熱嘔酸吐痰二陳加姜炒黃連山梔竹茹薑汁火炎上者暴吐喜冷惡熱面赤煩渴氣逆脈洪而數二陳加姜炒黃連山梔枇杷葉竹茹檳榔蘆根不止宜利小便不效用養正丹金匱方嘔而發熱者小柴胡湯主之潔古用小柴胡湯加青黛以薑汁打糊為丸名青鎮丸治嘔吐蓋本諸此嘔吐心痛宜作火治嘈雜心膈痛而嘔屬火宜四聖散白朮川連陳皮甘草胃熱而吐聞穀氣即嘔藥下亦嘔或傷寒未解胸中有熱關脈洪者是也並用蘆根汁金匱方嘔吐而病在膈上後思水急與之思水者豬苓散主之豬茯苓白朮等分杵為散飲後方寸匕嘔而胸滿煩渴煮枇杷葉汁主之渴欲飲水水入則吐者名曰水逆五苓散痰涎阻膈者嘔則食與痰並出噁心眩暈二陳加白芥子枳實竹瀝薑汁不止煎送滾痰丸中脘伏痰遇冷即發謂之冷癇服新法半夏湯砂仁神麯桔紅丁香草果白豆蔻各半兩大半夏四兩洗七次切二片用白礬末一兩沸湯浸一晝夜洗去礬末俟干一片切作二片薑汁一晝夜隔湯燉焙為末薑汁拌捏成餅炙黃再加甘草二兩五錢生薑炙為末每服二錢生薑自然汁調成膠入炒鹽湯旦服或撾脾湯麻油四兩良薑十五兩茴香七兩五錢甘草十一兩七錢炒鹽一斤同炒為末每服一錢白湯煎服有痰飲粥藥到咽即吐人皆謂其反胃非也此乃痰氣結在胸膈之間先宜姜蘇湯下靈砂湯金匱方諸嘔吐谷不得下者小半夏湯主之又云嘔家本渴渴者為欲解也今反不渴心下有支飲故也小半夏湯主之又云卒嘔吐心下痞膈間有水腫悸者小半夏加茯苓湯主之寒嘔吐則喜熱惡寒四肢清冷脈弱小而滑因胃虛傷寒飲食或傷寒汗下過多胃中虛冷所致食久反出食物不消當以剛劑溫之二陳湯加丁香十粒或理中加枳實五分或丁香吳萸湯藿香安胃湯藿香丁香人參各二錢桔紅五錢共為末每服二錢姜三片煎連渣服不效則溫中湯即理中湯加丁香甚則附子理中湯並須冷服蓋冷與冷則相入庶不吐出羅謙甫云諸藥不效者紅豆丸神效曾有人用附子理中湯四逆湯加丁香到口即吐後去乾薑人參附子加丁木香煎熟更磨入沉香立定蓋虛寒痰氣凝結丁附純溫佐以沉香木香則通乾薑白朮則汲耳脾土虛寒水來侮土以致嘔逆六君子湯加澤瀉乾薑丁香食嘔吐或痛或飽宜和中消導順氣為主卒不可下食滯胸膈胸腹痞悶惡食吞酸嘔吐酸黃水並宿食平胃散加曲柏半夏枳實生薑砂仁木香或磨入沉香汁氣嘔吐胸滿膈脹不食常飽食已暴吐其治當降氣和中二陳加枳實木香檳榔之屬氣逆而嘔覺金氣自下逆上蘇子降氣湯不效用靈砂丹氣滯者胸膈不利心腹刺痛木香調氣散木香丁香砂仁藿香白蔻陳皮半夏枳殼甘草姜氣鬱胃口結聚痰涎嘔吐者胸膈痞悶不思飲食加味七氣湯木香厚朴半夏青皮蒼朮枳殼陳皮茯苓甘草加山梔沉香風邪乘胃嘔吐飲食不得進吐而多汗脈弦葛根湯加前胡陳皮半夏生薑風痰乘於脾胃者半夏南星各一兩檳榔雄黃各三錢薑汁浸炊餅丸胃虛久病嘔吐聞穀氣藥氣即嘔者先用元米炒黃濃煎汁入鹽姜徐徐熱服以養胃氣間參朮炮姜飯丸服俟吐少止用參朮養胃湯人參白朮茯苓甘草桔紅半夏藿香砂仁神麯陳皮脾胃虛寒加丁香吳萸豆蔻若脈弱小便復利身微熱而手足厥冷此虛寒之極加附子清晨作吐者胃氣空虛腎水被肝木吊動也白朮五分吳萸半分川連三分養胃降火使氣得下通有食即吐者亦是氣虛非補命門相火何以得效吐而不出聲者屬虛宜溫不宜寒此名反胃凡嘔吐朝食暮吐暮食朝吐天明吐出或食未發時而隨變痰涎出者併入反胃門痞滿短氣而嘔調中益氣湯黃耆一錢人參蒼朮甘草各五錢柴胡升麻桔皮如腹中氣不得運轉更加到各三分木香一分或二分血虛氣不歸源而吐十全大補湯加陳皮半夏藿香先因大便不通後嘔吐水漿不入者此地道不通氣逆厥上即幽門不通上衝吸門之義老人虛人多有此症宜用生地當歸桃仁紅花以和血涼血潤血微加硝黃以通其閉或導法大便去氣得下嘔自止若大便不閉者禁用蟲嘔吐得食則嘔靜而復煩吐中有痰烏梅丸吐蛔乃胃中虛冷宜理中湯加川椒檳榔吞烏梅丸有熱加黃連王宇泰云嘔吐別無他症諸藥不效者乃蛔在胸膈作嘔宜於治嘔藥中加川椒十粒嘔吐清水屬濕吳萸一分一味蒼朮丸噁心嘔吐清水乃屬胃寒用白蔻仁研末食遠酒下或濃煎藿香湯下嘔吐清緑水肝木乘脾也六君子湯加青皮肉桂金匱方心胸中有停痰宿水自吐出後心胸間虛氣滿不能食茯苓飲主之乾嘔噦手足厥者桔皮湯卒乾嘔不息取甘蔗汁溫服半升日三服或入薑汁乾嘔吐涎沫手足厥者半夏乾薑湯周慎齊云乾薑炒為末鹽湯調服治乾嘔甚效理會云乾嘔因熱氣與痰搏結於胃熱氣上衝心下痞結故有此症用二味加薑汁炒芩連竹茹枳實生薑乾嘔吐涎沫頭痛吳茱萸湯嘔而胸滿吳茱萸湯嘔而腸鳴心下痞者半夏瀉心湯嘔而大小便不通氣逆不續嘔逆不禁名曰走哺下焦實熱故也人參湯主之人參黃芩知母玉竹茯苓各三錢蘆根竹茹梔子陳皮各五錢石膏一兩煅每服四錢水煎服食入即先嘔而後下身背皆熱肘臂牽痛其氣不續膈間最悶名曰滿氣此因上焦傷風開金腠理經氣先道邪氣著內麥門冬湯主之麥冬蘆根竹茹白朮各五兩炙草茯苓各二兩人參陳皮玉竹各二兩每服四錢姜一片陳米一撮研末服噁心乾嘔欲吐不吐心下映漾如畏船宜大半夏湯或小半夏湯茯苓湯理中湯治中湯皆可用似嘔不嘔似噦不噦心中憒憒無奈者生薑湯舊有風症見風則眼澀眼黑胸中有痰噁心兀兀欲吐遇風覺皮肉緊手足難舉動重如石遇暖隨減柴胡半夏湯主之半夏二錢蒼朮神麯生薑柴胡藁本升麻各五分茯苓七分為末服丹溪云吞酸素問明以為熱東垣又以為寒何也曰吐酸與吞酸不同吐酸似吐出酸水如醋平時津液隨上升之氣鬱而成積鬱積至久濕中生熱故從木化遂作酸味非熱而何其有鬱積至久不能自湧而出伏於肺胃之間咯不得出咽不得下肌表得風寒則內熱愈郁而酸味刺心肌表溫暖腠理開發或得香熱湯丸津液得行亦暫解然非寒而何素問言熱者言其本也東垣言寒者言其末也豫嘗治此症用黃連吳萸各制炒隨時令迭為五使蒼朮茯苓為輔湯浸蒸餅為小丸吞之仍令以蠣食疏果自養則病易安按吞酸一症素問東垣丹溪三說不同何也曰此症有虛有實內經言熱者指病形而言也如穀食勿熱不酸非熱而何東垣言寒者指病本而言也蓋脾胃虛寒不能化濕濕鬱為熱因以作酸非寒而何故用丁香以溫胃人參以養胃去其虛寒食物自然克化而不至留滯作酸矣汪山石云吐酸苦水由脾虛不能運濕濕鬱為熱故水作苦酸也宜用辛熱之藥濕逢熱則燥郁迂辛則開濕去郁開酸苦自除矣丹溪言寒鬱為熱者兼標本而言也以飲食入胃未及運化或食冷物或受風寒濕熱被郁因而作酸故用平胃加山梔黃連以治其本熱吳萸蒼朮以散其標寒寒散熱除酸自止矣是知屬熱屬冷皆病機之所必有者審其脾氣虛寒飲食不能輸化濁氣不能下降而作酸者用加減安胃湯人參藿香丁香吳萸白朮半夏砂仁陳皮炮姜偶爾作酸嘈雜便閉食易化此濕熱鬱遏也用加減清胃湯黃連吳萸炒黃芩薑汁炒陳皮蒼朮山梔厚朴赤苓生薑中脘有飲則𩞄有宿食則酸故常噯腐氣逆咽酸水亦有每晨吐清酸水數口日間無事亦有胸膈間常如酸折皆飲食傷於中脘所致生料平胃散加神麯麥芽各一錢有熱用醋丸吳萸煮曬陳皮去白黃芩炒各五錢蒼朮七錢五分黃連陳壁土炒一兩神麯糊丸膈間停飲積久必吐酸水神術丸蒼朮米泔浸生芝麻用水二盞研細取漿一斤大棗煮爛去皮核十五枚以蒼朮焙乾為末然後以芝麻漿及棗肉為丸每服五十丸初服覺燥用山梔湯下酒癖停飲吐酸水用乾薑丸乾薑枳殼橘紅葛根前胡各五錢白朮半夏曲各一兩吳萸炒甘草各錢半風痰眩冒惡食吐酸水半夏南星白附子為末滴水丸桐子大以生面為衣陰乾每服十丸至二十丸薑湯下參萸湯可治吞酸亦可治自利六一散六兩吳萸二兩煮一方去吳萸加乾薑診兩寸洪數者濕熱右關沉微者虛寒氣口緊盛者宿食嘔苦是膽液泄胃氣逆也陽明在泉燥淫所勝病喜嘔嘔有苦又陽明之勝嘔苦治以苦溫辛溫是運氣嘔苦屬燥也吐而瀉用胃苓湯以瀉為主海藏云上吐下瀉不止當渴而反不渴脈細微而弱者理中湯主之丹溪云泄瀉或嘔吐生薑湯調六一散潔古云有痰而泄利不止甚則嘔而至於吐下而不能食由風痰羈絆脾胃之間水煮金花丸主之半夏南星寒水石各一兩燒存性天麻五錢雄黃錢半白麵四兩共為末丸如桐子大每服百丸先煎漿水沸沸藥煮浮為度漉出薑湯下食前服仲景云嘔家有癰膿不可治嘔膿儘自愈仁齊以地黃湯主之生地洗焙川芎各一兩半夏炙草各七錢五分南星湯洗七次白芍白芷茯苓桔梗前胡知母人參各五錢姜三片烏梅八分每服三錢吐食乃上焦氣熱沖逆食已暴吐脈浮而泄宜先降氣和中以桔梗湯桔梗白朮各一兩五錢半夏曲二兩桔紅枳實茯苓厚朴一兩每服一兩調木香散木香檳榔為末二錢隔夜空腹服中焦吐食由食積與寒氣相格故吐而疼宜紫沉丸砂仁半夏曲烏梅丁香檳榔各五錢沉香杏仁白朮木香各一錢陳皮五錢白蔻仁巴霜各五錢另研共為末入巴霜醋糊為丸丸為黍米大每服五十丸食後薑湯下愈即止凡吐諸藥不效蘇梗煎湯磨檳榔沉香枳殼服之即效王宇泰云嘔吐諸藥不效當借鎮重之品以墜其氣用姜蘇湯下靈砂丹水銀一兩硫黃五錢新銚炒成珠入水火鼎鍛鍊為末元米為丸麻子大水下四五十丸每至百丸俟吐止隨症調治慎齊方沉香烏藥為末姜三片淡鹽點嚼去渣津液咽下極效又法加人參甘草末減半姜鹽點藥末擦牙津液咽下旋覆代赭石湯能止氣逆痰飲作嘔不止亦鎮重之義用之甚效古方通以生薑半夏為正劑獨東垣云生薑治嘔但治表實氣壅若胃虛穀氣不行惟當補胃推揚穀氣而已故服小半夏湯不愈服大半夏湯半夏五錢人參三錢白蜜二錢水二碗和蜜揚之二百四十遍煮八時溫服診寸口脈數其人則吐陽浮而數亦吐脈浮而洪為熱浮而熱為積沉而遲為寒細為虛關前沉伏或沉滑為痰為冷關脈浮大為風在胃中陽緊陰數難治寬緩者可治上部有脈下部無脈其人當吐不吐者死嘔吐大痛色如青菜葉汁者必死凡嘔渾身作脹者死大便閉者不治無脈者不治昔人曾用丁沉藿香等溫中順氣而愈者喻嘉言云倪慶雲病膈氣十四日粒米不入咽始吐清水次吐緑水次吐臭水呼吸將絶余診之曰盡一晝夜先服理中湯六劑來朝轉方一劑安全渠家曰病已至此安能服藥六劑余曰但得此等甘溫入口必喜而再服曰憑有抄方何不即投必先與理中余曰金匱云病後噫氣不除者旋覆代赭石湯主之吾於此病分別用之者有二道一者以黑水為胃底之水臭水為腸中之水此水且出則胃中之津液久已不存不敢用半夏以燥其胃之液一以將絶之氣止存一線以代赭墜之恐其立斷必先以理中分理陰陽俾氣易於降下然後代赭得以奏績及檢仲景方見方中止用煨姜而不用幹姜又謂乾薑比半夏更燥而不敢用余曰尊人所噫者下焦之氣也所嘔者腸中之水也陰乘陽位加以食久不食諸多蛔蟲必居上膈間非乾薑之辣則蛔蟲不下轉而上氣亦必不下轉妙處正在此進藥後果再索藥三劑後病者能言云內氣稍接但恐太急俟天明再服次早中醫交阻渠家並後三劑不肯服矣余持前藥一盞勉令服之曰吾於衆醫前立地轉方但用旋覆花一味煎湯調代赭石末與之二茶匙才入口病者曰好藥吾氣已轉入丹田矣病者以十四日衣不解帶目不交睫憊甚因圖脫衣安寢冷氣一觸復嘔與前藥立止思粥令食半盞渠飢竟食二盞少須又食六盞復嘔與前藥立止又因動怒以物擊婢復嘔與前藥立止以後不嘔但困倦之極服補藥二十劑丸藥一斤息二月始能遠出方悔從前少服理中二劑耳紅豆丸治諸嘔逆膈氣反胃吐食丁香胡椒砂仁紅豆各二十粒共為末薑汁糊丸皂角子大每服一丸以棗一枚去核填藥麵裹煨熟去面細嚼白湯下空心服日三服噎膈反胃氣留噎嗌噎塞窒礙食物不得順利曰噎氣結胸膈填塞隔絶食物不得下通曰膈反胃者因其隔絶不得下行故復反出於胃也丹溪云噎膈生於血乾血陰也陽主靜內外兩靜則臟腑之火不起金水二氣有所養陰血自生胃腸津液傳化合宜何噎之有惟血液俱耗胃脘乾槁其槁在上近咽之下水飲可行食物難入名之曰噎其槁在下與胃為近食雖可入良久復出名之曰膈亦曰反胃二者皆由陰中伏火而作蓋陽與陰不能施化陰之失位而陽伏其中傳化失職而反上行也子和云三陽結為之膈三陽者大小腸膀胱也小腸熱結則血脈燥大腸熱結則便不通膀胱熱結則津液涸三陽既結則前後閉澀下既不通氣必反而上逆所以飲食不下縱下而復出也此陰火不下行而上逆也張雞峰云噎膈是神思間病惟內觀自養薄滋味忌香燥戒鬱怒可獲全安若氣血兩虛口吐涎沫糞如羊屎六脈緊澀皆不治也劉宗厚云噎膈之症皆由氣聚成積自積成痰痰積之久血液俱病以其為病在咽在膈故立噎膈之名嚴氏主化痰順氣夫氣之不下痰之不化必有為病之因苟不知其本而專用香燥之藥治其標痰氣何由而自下乎理會云噎膈多由暮年之人其屬血乾也明甚蓋血結則無以制火火盛則津液脂膏因火成痰水穀道路因火乾槁故痰火窒塞胸膈而成噎膈也其中年之人偶有噎膈則多屬憂思鬱怒所致夫鬱怒則氣滯憂思則氣結痰因氣聚而生氣因痰礙而愈結故為噎膈反胃也用藥之時切勿執滯血虛者以滋養為主氣鬱者以理氣為先痰涎上阻宜用酸苦湧泄因而治下藥勢易行如燥結久閉宜用蜜導通幽因而潤養則關扃自透若郁既久則壅塞堅頑不用開結軟堅之藥遽用補養吾恐痰因補而愈多氣因補而愈窒矣竊見世人治噎膈非用香燥之劑即用牛羊之酪豈知香燥能助火耗血酥酪是滯氣生痰求其病愈不亦難乎按內經云三陽結謂之膈張雞峰以為神思間病法當內觀靜養所言深中病情大抵氣血虧損後因悲思憂恚則脾胃受傷血液漸耗氣機阻礙鬱氣生痰痰則塞而不通氣則上而不下妨礙道路飲食難進噎膈所由成也脾胃虛損運行失職不能腐熟五穀變化精微朝食暮吐暮食朝吐食雖入胃復反而出反胃所由成也東垣云諸塞咽喉之間令諸經不行則口開目瞪氣悶欲絶當先用辛甘氣味俱揚之藥益智仁草蔻參耆歸升麻之類引胃氣以治其本加開塞之藥木香青皮陳皮麥芽以治其標也若寒助陰邪於正藥內加吳茱萸大熱大苦辛之味以瀉陰寒之氣暑月陽盛則於正藥中加青皮陳皮益智黃柏散暑氣泄陰火之上逆或以消痞丸合滋腎丸或更加黃連每服七八十丸空心約宿食消盡服之待少時以美食壓之不令胃中停留也按噎塞之症塞者陰也血也噎者陽也氣也二者皆由陰中伏火而作也東垣用藥先用辛甘氣味俱揚之藥升發其胃氣以為滋生之本繼以滋腎丸純陰之藥以瀉陰中之火制其沖氣之上逆庶表裡相通陰陽各得其正此治噎塞之大法也至痰凝氣結血瘀津枯皆能致噎其治法又當察證憑脈其治法又非東垣一言所能盡也噎膈生於血乾滋養為主歸地門冬煎膏入韭汁乳汁童便蘆根汁桃仁泥兼氣虛者參耆四君憂恚氣結者兼開鬱理氣大忌香燥之藥犯之必死大便閉塞多用桃仁麻仁氣壯者加元明粉噎塞不通有形滓質之物不能下咽若吐沫不已者此氣血大虛法在不治若脈形未敗者惟宜大補氣血參耆歸術仍加陳皮桃仁牛乳白蜜薑汁或煎成膏緩緩調之可救什中之一脈細而弱或沉而澀者此氣虛挾寒理中湯加人乳薑汁白蜜痰多加半夏中氣虛而不任用血藥者一方用生薑汁白蜜牛膝各五兩人參百合為末各二兩放銅鍋內慢火煎如膏不拘時候含一匙津咽或人參湯調下一茶匙食物下咽屈曲自膈而下哽澀而痛多是瘀血用前歸地諸汁膠內加桃仁童便韭汁鬱金末降香末調補之後以抵當丸如芥子大服二三錢服後仰臥細細嚼之有實積者可暫用厚朴丸亦可用昆布丸張孟端夫人形肥體盛憂怒之餘得食輒噎胸中隱隱痛士材診之曰脈緊而滑痰在上脘用二陳加半夏竹瀝薑汁服四劑不效或疑半夏性燥曰濕痰滿中非此不治改用大半夏湯四帖胸痛乃止服二十劑而安若痰不盛形不肥者不可與也氣滯胸痞胃寒噎塞脈沉遲澀津血不枯者用香砂寬中湯木香磨白朮陳皮香附白豆蔻砂仁青皮檳榔半夏曲茯苓厚朴甘草姜加蜜少許煎服七情鬱結胸背引痛脈沉而澀四磨飲加黃連山梔川貝香附蘇子鬱結傷脾歸脾湯加枳桔痰飲阻滯脈結澀者利膈豁痰湯桔紅半夏枳實桔梗栝蔞黃連梔子香附細茶檳榔沉香石膏白芥子初服二三帖加麻黃蘇葉煎濕痰瘀塞胸口作痛形肥脈滑大半夏湯噎病喉中如有肉抉食不下用昆布二兩洗去鹽水小麥二合水三大盞煎俟麥爛熟去渣每服不拘時吃一小盞仍取昆布不住口含兩三片咽津極效昆布丸治五噎咽喉妨塞食飲不下昆布洗去鹽水天麥冬焙訶利勒去核各一兩五錢木通大黃微炒朴硝郁李仁浸去皮微炒桂心百合各一兩羚羊角屑杏仁麩炒蘇子射干各一兩五錢柴胡陳皮檳榔各二錢五分蜜丸桐子大每服三十丸不拘時熱酒送下夜飲後棉裹彈子大一丸噙化按此方治痰熱壅結妨礙噎塞甚效若脾虛血乾者又非所宜也治卒噎用杵頭糠手中布裹時時拭牙或煎湯呷下或蜜丸含咽津亦得一方杵頭糠人參末石蓮肉末柿霜元明粉等分舐吃治噎散結化痰湯治氣留咽嗌有如梅核俗名梅核氣亦噎膈之漸也薑製黃連山梔香附童便浸川貝川芎半夏桔紅蘇葉青黛枳殼鳳尾草白蔻仁生薑嘔者加枇杷葉一婦患咽喉噎塞如梅核時時噯氣足冷如冰用前方十劑罔效熟思之乃陰火也三陰至項而還陰虛火炎故咽塞噯氣足冷耳聾用滋陰清膈飲數劑諸症皆退黃柏鹽水炒黃連薑汁炒黃芩梔子當歸白芍生地甘草入童便竹瀝薑汁按此方治陰火上衝食不得入脈洪數者方可用之否則有傷脾敗胃之虞以上諸方治噎症之大法也咽喉閉塞胸膈膨滿似屬氣滯暫宜香砂調中湯有因火逆上衝食不得下其脈洪大有力或數者滋陰清膈為主兼降火理氣枇杷葉蘆根汁竹茹黃連山梔等少年屬陰虛者仍用四物門冬童便牛羊乳或滋陰清膈飲有胃之下脘不通者三陽閉結上衝吸門食不得下當滋養其下慎勿用香燥之品中焦吐者皆從瘀積有陰陽之分其症或先吐後痛法當去積和中分氣血痰積而施治之慎齊云膈氣有氣膈血膈痰膈治膈先當開關氣膈開關小茴香烏藥檳榔血膈開關當歸烏藥枳殼檳榔沉香桃仁紅花痰膈開關半夏附子關開者可治宜理脾溫肺用補中益氣湯加附子煮烏梅痰飲阻滯胸膈食復反出脈來結澀或緊而滑者用二陳湯入竹瀝薑汁或小半夏湯痰多食飲才下便痰涎裹住不得下者以萊蔔控去痰涎或滌痰丸半夏曲枯礬皂角炙刮去皮結子元明粉茯苓枳殼各等分霞天膏和丸痰血在胸膈間阻礙氣道或膈或脘必痛痛連於背脈來有力或結澀然得之憂怒忿鬱之人多有此症以代抵當丸作芥子大術三錢去枕仰臥細細嚼之下惡物凡大怒血鬱於上積在胸膈礙氣升降津液聚為痰飲二陳加白芥子香附韭汁桃仁五靈脂大便燥結閉久不通屬血熱者止可清熱小著湯丸纍纍加之關扃自透滋血潤腸湯當歸酒洗三錢白芍生地各錢半紅花酒洗桃仁大黃枳殼各一錢韭汁半杯人參利膈丸木香檳榔各七錢五分人參當歸酒洗藿香甘草枳實麩炒黃各一兩大黃酒煎厚朴薑製各三兩水泛丸每服三十五丸食後服按上二方皆用大黃一治血閉一治氣閉用者詳之通利之藥不可多用恐反耗其血液而便愈結當滋養其血而便自行糞如羊屎者大腸枯結不治乃陽陷於陰分陽陷則陰絶當用補中兼升舉之法良方秦川翦紅丸治膈氣成反胃由瘀血成病者及能下蟲效雄黃另研木香各五錢檳榔三稜蓬朮並煨貫仲乾漆炒煙盡陳皮各一兩大黃一兩五錢麵糊丸桐子大每服五十丸食前米飲下本事方芫花丸治結聚停飲痰水生蟲酒癖為患成反胃者芫花醋炒牛膝各一兩狼牙根桔梗炒黃藜蘆檳榔各五錢巴豆炒十粒醋糊丸如赤豆大每服二三丸至五七丸止食前薑湯下巢氏病源論酒瘕云飲酒多而食谷少積久漸瘦其症常欲思酒不得酒則吐多睡復不能食是胃中有蟲使然名為酒瘕此藥治之須禁酒方易治以上諸法治反胃由於痰血蟲積者中氣虛弱不能運轉噎塞反胃者補氣運脾人參二錢白朮二錢桔紅茯苓各錢半蜜炙黃耆一錢砂仁八分炙草四分有痰加半夏姜棗理中加附子亦可選用李絳療反胃嘔吐無常粥飲入口即吐困倦無力垂死者用人參三兩擘破水一大升煮取四合熱服膈症隨吃隨吐或吃未幾隨交痰涎出者此火在胃中而丹田真火不足也故紙茴香萸實人參烏藥沉香有因脾胃陽火內衰其脈沉而遲者以辛香之品溫其中氣丁香透膈湯白朮二兩香附人參砂仁各一兩丁香麥芽木香肉白蔻青皮各五錢沉香厚朴藿香陳皮各七錢五分炙草一兩五錢半夏神麯草蔻各二錢五分每服四錢或穀神嘉禾散茯苓砂仁苡仁人參枇杷葉各一兩桑皮白朮檳榔白蔻青皮穀芽五味各五錢沉香杜仲各七錢桔紅丁香藿香隨風子石斛半夏大腹子木香各七錢五分炙草一兩五錢神麯二錢五分每服三錢水一盞加薑棗此方和脾胃寬胸膈順氣消痰進飲食為噎膈之要方也仍佐以益陰之藥為佳旋覆代赭湯嘉言每用以治膈氣嘔吐不止水穀不得下咽絶粒不入甚至嘔吐清緑黑臭之水用以鎮墜其氣則能進食屢建奇功中氣虛極不能任其重墜者先用理中之劑以安中氣後進此藥下焦吐者皆從於寒其症朝食暮吐暮食朝吐王太僕云食不得入是有火也食入反出是無火也此下焦火衰釜底無薪不能腐熟五穀所出完穀不化脈來遲微或虛火當用補火之藥令火土相生慎齊治反胃朝食暮吐暮食朝吐或早晨吃粥至次早吐而突出若無阻之者胃氣大虛宜二陳湯加丁香檳榔枳殼溫而降之不用檳榔用黃連五釐吳萸三釐同炒加生薑同煎服二錢後方可用參嘔而不出聲者宜溫不宜寒若胃之下脘閉結不能傳送大腸大便不通食久復出當微利之人參利膈丸利後惟在調理中氣兼以滋陰一方治膈通關用大黃姜炙為末五錢沉香末三錢用人參煎濃湯浸於飯上續咽之仍加竹瀝薑汁等尤佳亦透關扃之善法也祕方治膈氣用生薑蒲包浸陽糞坑內四十九日取出炙乾為末每服三錢加歸身五錢桃衣三錢枳殼三錢煎服此方得之一友傳來云試之屢驗金匙散用生薑蒲包裹三月三日浸糞坑中至六月六日取起曬乾蜣螂取活者以線懸當風處二味等分白滾湯送下一錢三四服其關自開然後依證調理可也一方將上制薑末三錢制枳殼末七錢和勻不論噎膈痰氣食積俱用火酒下心腹痛白酒下一錢二分開關散枳殼去穰入皮硝巴豆於中合定以線縛之煮熟去硝豆為末火酒下五分壯實者一錢一方枳殼照上制後再用桔梗烏藥蒼朮檳榔半夏青皮山楂香附各等分煎濃汁以枳殼片浸透曬乾再曬以汁完為度每服一斤藥味各七錢用水十碗煎五碗又方梨一枚去子入五靈脂末一兩濕紙包裹火中煨熟去五靈脂為細末木香沉香陳皮各三錢附子烏藥各二錢牛黃五分入開關散三錢蜜丸圓眼大火酒化下一丸仙螺膠治膈症取大田螺四十九枚洗淨再以清水養去泥士倒覆盆內一宿次將淨川連二兩切片煎濃汁熬膏一小杯然後將螺仰置盆內日中曬乾候靨開挑入連膠一匙過一夕螺化為汁取螺汁再用柏葉汁韭根汁人乳牛乳羊乳豬乳各一杯煉蜜一兩入真金一塊砂銚熬成膏瓷器收藏每服一二匙酒下膈氣神方冬青子柏子仁白芥子蘇子卜子百合苗川貝花清明收桑寄生各二錢沉香二錢蘇合油四分奇南香一錢淡竹葉二錢淘米泔二鍾煉蜜四兩先用米泔加前藥煎熟後入蜜煎一滾放屋上露一宿每日清晨滾水下七匙睡時再一匙按噎膈反胃三症潔古分上中下三焦異治蓋噎膈之吐即潔古之上焦吐反胃之吐即潔古之下焦吐也其名雖異然其要總不離乎陰虛陽虛之二途陰者血也津也陰虛則津血內枯陽火獨亢火性炎上故為膈為噎治之當滋血養陰以治其本清火潤下以治其標陽者氣也火也陽虛則中氣不充健運失職火衰則無以腐熟五穀故雖入而復出其為反胃為朝食暮吐暮食朝吐也治之當補火健運以治其本消痰順氣以治其標此治噎膈之大法至於劫奪之劑又安用耶殊不知噎膈之本雖虛而痰火氣血日久凝滯瘀塞道路膠固不通以致食物難入或雖入而復出於此時也若不先以劫奪之藥開其固結而滋補之味又安能透其關扃耶但關開食進之後即當繼以補益之劑續進飲食病自愈矣竟致以此等為膈氣之專方吾未見其不敗也又按劫奪之劑有用大黃黃連有用炙薑枳殼或寒或熱其治各異臨症時又當參其可否慎勿以症合法也諸汁為治膈必用之藥臨時隨宜選用霞天膏導痰消瘀最妙不傷中氣不動臟腑為大醫者當備應用大抵噎膈之證多有結痰瘀血相停若不去之病必不除然結散之後惟在謹慎緩調戒口絶欲千日把持庶可全愈否則愈而復發中氣既傷難可再劫死者多矣噎膈既愈之後不可便與粥飲及諸雜物每用人參五錢陳皮二錢作湯細啜以扶胃氣旬日半月間方可小試陳倉米飲漸進糜粥進之早者多致不救年高病人元氣敗壞手足寒冷糞如羊屎沫大出者皆不治不守禁忌若怒若郁者皆不治診脈緊而滑者吐逆小弱而澀者胃反沉緩而無力或大而弱為氣虛數而無力澀小為血虛數而有力為熱結為痰飲為虛滑為痰寸關脈沉是氣寸關脈沉或伏或大是痰反胃之脈沉細散亂不成條達沉浮則有中按則無必死不治更參面色不致黃白亦不致純白皆惡候也五噎丸治胸中久寒嘔逆妨食結氣不消乾薑蜀椒吳萸桂心細辛各一兩人參白朮各二兩廣皮茯苓各一兩五錢附子一枚炮為末煉蜜九桐子大酒服十五丸日三服漸加至三十丸乃止五膈丸治飲食不得下手足冷上氣喘急麥冬三兩甘草二兩蜀椒遠志桂心細辛乾薑各一兩附子一枚人參二兩為末煉蜜丸彈子大先食含一丸細細嚼之胸中喉中當熱藥丸稍盡再含一丸日三次夜二次七日可愈五膈五噎二丸固用參附椒辛薑桂之屬一以肝氣上逆胃氣不下而嘔故宜萸橘以疏肝降逆苓術以健胃通津以腎氣之不蒸肺胃枯槁而不納故用冬草以滋肺和胃遠志以補火生土又嘔噎而藥食可進者頻與小丸調之膈食而飲不納者用大丸咽之其立法之詳若此附後方治食後喜嘔鹿角燒末二兩人參一兩為末薑湯服方寸匕日三次藿香安胃散治脾胃虛弱飲食不進嘔吐不腐藿香橘紅各五錢丁香一錢人參一兩為散每服二錢姜三片煎湯食前和服膈氣方元精石紙包火煨醋淬為末人中白燒紅五穀蟲煅末各等分每服三錢燒酒送下吃後自進飲食雜病霍亂霍亂者心腹卒痛嘔吐下利或憎寒壯熱頭目眩暈甚則轉筋入腹者難治丹溪云內有所積外有所感致成吐瀉用二陳湯加減作吐以提其氣此非鬼神皆屬飲食乃陽不升陰不降乖陽而成切莫與穀食惟米飲一呷入口必死必待吐瀉二三時直至餓甚方可與稀粥食之脈多伏或絶凡或吐瀉不徹還用吐以提其氣或用樟木煎湯吐亦可三因吐法用極鹹鹽湯三升熱飲一升探吐令宿食尿不吐更服吐後隨症調理此疾多生夏秋之交皆由伏暑而然病之將作必先腹中疴痛吐瀉之後甚則轉筋此兼風也手足厥冷氣少唇青此兼寒也身熱煩渴氣粗口燥此兼暑也四肢重著骨筋煩疼此兼濕也當詳別三因以調之張戴人則以風濕暍三氣而為邪斷言最當夏月中暑霍亂吐瀉心腹撮痛大渴煩躁四肢逆冷汗自出兩足轉筋宜香茹飲厚朴黃連各二兩香茹四兩甘草五錢每服四錢澄冷服之桂苓白朮湯桂枝人參白朮茯苓各五錢澤瀉寒水石石膏各一兩滑石二兩一方有木香藿香葛根各五錢為末每服三錢白湯下傷暑霍亂用絲瓜葉一片霜梅肉一個並核中仁同研極爛新汲水調服入口立瘥取扁豆葉搗汁一碗飲之立愈牆陰掘地約二尺許入新汲水攪之澄清名曰地漿水用一杯調服之蓋取地漿者取其至陰之氣能解陽盛暑熱之邪也戴人云人於夏日多食瓜果之物或飲冷乘風以致食留不化因食成痞隔絶上下遂成霍亂六和湯倍藿香煎熟調蘇合香丸濕霍亂除濕湯半夏曲三錢厚朴蒼朮各二兩藿香陳皮茯苓各一兩炙草生白朮一兩每服四錢姜七片棗一枚訶子散訶子去核炮炙草厚朴炮姜神麯草果良薑炒茯苓麥芽炒陳皮各等分為末每服二錢候發不可忍時用水煎入鹽少許七情鬱結五臟六腑互相刑剋陰陽不和吐利交作七氣湯吳萸木瓜食鹽各五錢同炒令焦先用瓷瓶安排盛水三升煮令百沸入煎藥煎至二升傾一杯冷熱隨病人服四肢厥冷亦用此湯霍亂多寒肉冷脈絶宜通脈四逆湯霍亂用藿香正氣散加減氣盛者加木香痞塞者調蘇合丸暑濕相搏煩渴悶亂者合香茹飲名二香散藿香陳皮白朮厚朴茯苓半夏蘇葉桔梗白芷香茹黃連扁豆各一錢大腹皮甘草各五分姜五片蔥白三根吐而不瀉心腹疴痛頻欲登圊苦於不通本方加枳殼一錢傷寒霍亂多在陽明胃經以胃為水穀之海主中焦之氣腐熟水穀若中焦氣滯或因寒飲或因飲水或感濕氣冷熱不調水火相干陰陽相搏上下相離營衛不能相維故暴成吐瀉有從標而得之者有從本而得之者有從標本而得之者六經之變治各不同察其脈色知犯何經隨症標本各施其治如頭痛發熱邪自風寒而來中焦為熱相半之分邪高者居陽分則為熱熱多飲水者五苓散以散之如邪稍下者居陰分則為寒寒多不飲水者理中湯以溫之如吐利後有表症者解之汗出厥者溫之解法仍別有寒無汗分風寒施治吐利不止元氣耗散病勢危篤或水粒不入或口渴喜冷或惡寒戰掉手足逆冷或發熱煩躁欲去衣被此蓋內虛陰盛卻不可以其喜冷雖去衣被為熱也宜理中湯甚則加附子不效則四逆湯並用十分冷服伏暑之症脈多伏絶最宜明辨霍亂並諸吐瀉已愈而力性精神未復者十補散即十全大補湯轉筋陳氏云轉筋者以陽明養宗筋屬胃與大腸令暴吐下津液頓亡外傷四氣內傷七情飲食甜膩攻閉諸脈宗筋失養必致攣急甚則舌卷囊縮者難治也木瓜煮汁飲之千金云轉筋不止男子則以手挽其陰女子則以手牽其乳近兩邊此好法也霍亂煩渴以增損縮脾飲草果烏梅甘草砂仁各四兩乾葛二兩每服五錢生薑五片同煎以水浸冷沖服之主之能解伏熱消暑毒霍亂之後服熱藥太多煩躁作渴尤宜服之霍亂之後煩渴飲水宜茯苓澤瀉湯茯苓八兩澤瀉四兩炙草桂心各二兩白朮三兩每服四錢姜三片一方用小麥五兩霍亂已愈煩熱多渴小便不利宜麥門冬湯麥冬茯苓人參橘皮白朮各錢半小麥炙草各一錢姜三片烏梅少許霍亂後噁心懶食口乾多渴宜白朮散白朮茯苓人參藿香各五錢葛根一兩木香二錢五分炙草一兩五錢每服四錢白湯下如煩渴加滑石二錢霍亂後利不止冷汗出腹脅脹宜烏梅散烏梅三錢黃連三錢當歸附子熟艾各七錢五分阿膠三錢肉蔻赤石脂各一兩炙草五錢米飲調服二錢霍亂後下利無度腹中疴痛黃連丸黃連黃柏厚朴各七錢五分當歸炮姜木香地榆各五錢阿膠三錢蜜丸粥飲下二十丸霍亂後下利見血宜止血湯當歸桂心川斷各三兩生地炮姜阿膠蒲黃炙草各二兩每服三錢赤石脂湯赤石脂四兩升麻白朮各一兩五錢烏梅乾薑各一兩陳倉米梔子仁各五錢每服三錢乾霍亂忽然心腹脹滿攪痛雖吐不吐雖瀉不瀉躁亂憒憒無奈俗名絞腸痧是也此因脾土鬱極而不得發以致火熱內撓陰陽不交表裡不得相通不急治即死但治不可過於攻過則脾氣虛不可過於熱過則內火愈燥不可過於寒過則火必與捍格須反佐以治古方有用姜鹽飲調以童便非獨以降陰之不通陰既不通其血亦不行兼用行血藥也此誠良法可為處方者比類矣丹溪用吐以提其氣最是良法也治絞腸痧手足厥冷腹痛不可忍者以手醮溫水於病者膝灣脘內撲打有紫黑點處以針刺其惡血即愈或於胸背手足額項刮之亦愈霍亂其脈洪大者易治脈凝囊縮舌卷者不治霍亂之脈多代霍亂之後陽氣已脫或遺尿不知或氣少不語或膠汗如珠或大躁欲入水或四肢不收皆不可治關格格則吐逆關則不便格者陽盛之極格拒於外入者不得納關者陰盛之極閉塞其內出者不得泄乃陰陽各造其偏兩不相維之症也素問謂人迎一盛病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰人迎與寸口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣靈樞復云邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陰氣盛矣陰氣太盛則陽氣勿能榮也故曰關陽氣太盛則陰氣勿能榮也故曰格陰陽俱盛不得相榮故曰關格關格者不得盡期而死矣仲景云寸口脈浮而大浮為虛大為實在尺為關在寸為格關則不時小便格則吐逆此以寸口關尺脈中察其或浮或大定其陽虛陽實陰虛陰實以施治療其義精矣不爾關則定為陰實格則定為陽實抑何從得其精細耶又云心脈洪大而長是心之本脈也上凝頭小者則汗出下凝本大者則關格不通不得尿頭無汗者可治有汗者死此則深明關格之源由於五志厥陽厥陽之火鬱於心包之內其心脈上凝見頭小亦陽虛之驗下凝見本大更陽實之徵頭無汗者可治有汗則心之液外亡自焚而死矣又謂趺陽脈伏而澀伏則吐逆水穀不化澀則食不得入名曰關格診趺陽足脈辨胃氣之有無水穀入而不化胃氣之所存可知矣澀則並其食亦不得入胃氣所存更可知矣營衛之行遲水穀之入少中樞不運下關上格豈待言哉仲景立此三法大概在顧慮其虛蓋關格之病精氣絶竭形體毀阻離絶菀結憂恐喜怒五臟空虛血氣離守厥陽之火獨行上合心神同處於方寸之間存亡之機間不容髮不可不辨也關格之症上下格絶治之惟宜調其營衛不偏陰偏陽一味沖和無忤聽胃氣之自為敷布由一九而二八三七四六乃始得協於平也豈一蹴所能幾耶故不問其關於何而開格於何而通一惟求之於握樞而運以漸透於上下俟其趺陽脈不伏不澀營氣前通乃加意於營衛氣前通乃加意於衛因其勢而利導之庶不與藥扞格耳夫死裡求生之法須得死裡求生之人嗒然如喪先熄其五志交煽之火治吐逆之格由中而漸透於上治不溲之關由中而漸透於下治格而且關由中而漸透於上下乃盡義也庸俗之輩不知此中導竅之妙但知止嘔利小便亟治其標伎窮力盡無益反損不為其敗者鮮矣關格一症推云岐子所立九方奈其徹宗霸術不識病本嘉言氏擬用仲景傷寒門中黃連湯一方為之進退黃連薑汁炒人參人乳拌炮姜桂枝一錢半夏五錢大棗二枚進法俱用不制退法不用桂枝黃連減半或加肉桂五分如上逐味制熟但空心朝服崔氏八味丸三錢半飢時煎服一聽胃氣之上下敷布不問上熱下寒下熱上寒皆可治也方中人參甘草半夏大棗助胃氣以握樞而運加桂枝黃連以通達其上下兼炮姜之辣以開利其中其于格則吐逆胸背窒塞食不得入入亦復出之症者能開之至於五志厥陽之火上行桂枝又不可用矣恐其以火濟火也復立資液救焚湯以治五志厥陽之火生地絞汁二錢麥冬取汁二錢人參錢半人乳拌蒸炙草一錢阿膠一錢胡麻仁炒研一錢柏子仁七分五味四分紫石英一錢寒水石一錢滑石一錢三味俱敲碎為末生犀汁三分生薑汁二匙上藥除四汁及阿膠共入用泉水四茶杯暖火煎至一杯半去渣入四汁及阿膠再上火略煎至膠煬化調牛黃細末五匣內中分二三次熱服空朝先服崔氏八味丸三錢其關則不得小便桂枝亦在所不取但胃之關門已閉少陰主闔少陰之氣不上胃之關必不開也是則腎氣丸於小便不通之關證亦在所必用腎氣上交於胃則關門開而溺溲自通交於心則厥陽之火隨之下伏進退一方次第如此至於病變無方生心化裁如智者臨症活法可也厄逆靈樞經云谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰傷寒論皆在陽明症中謂濕家下之太早則噦而陽明病不能食攻其熱必噦皆因下後胃氣虛而噦者也至有邪熱內蘊氣不能通有漸熱時時噦者與小柴胡湯和解之噦而腹滿視其前後知何部不利利之則愈此皆不治之症至如病極譫語甚者而噦又不尿腹滿加噦者皆不治大抵噦聲頻密相連者為實可治如半時噦一聲者為虛難治死在旦夕劉宗厚云厄逆有虛有實有火有痰有水氣不可專作寒論蓋傷寒發汗吐下之後與瀉利日久及大病後婦人産後有此症者皆脾胃氣血大虛之故也如平人食入太速而氣噎或飲水喜笑錯喉而氣嗆或痰水停膈心中或暴怒氣逆痰厥或傷寒熱病失下而有此者則皆屬實也夫水性潤下火性炎上今其氣自下而上非火而何東垣謂是陰火上衝而吸之氣不得入胃脈反逆由陰伏陽而作大抵治法虛則補之虛中須分寒熱如因汗吐下後誤服寒涼過多當以溫補之如脾胃虛火逆上當以平補之挾實者涼而補之若夫實者如傷寒失下地道不通因而厄逆當以寒下之如痰飲停蓄或暴怒氣逆痰厥此等必形氣俱實別帶惡候當隨其邪之所在湧之泄之清之利之也吐利後胃虛寒者理中湯加丁香柿蒂散病後胃中虛寒者厄逆至八九聲相連收氣不回者難治人參茯苓陳皮半夏良薑炒丁香柿蒂各一兩生薑一兩五錢甘草五錢水煎服合蘇合香丸尤妙一方枳殼良薑丁香柿蒂水煎服甚者加附子胃虛熱者橘皮竹茹湯陳皮竹茹大棗甘草生薑人參陰虛木挾相火直衝清道而上者當補陰而抑木火上逆之勢大腸燥結脈沉數者調胃承氣湯主之汙血亦能作噦丹溪治超越陳氏因飽後奔走數里患噦但食物則連噦百餘聲半日不止飲酒與湯則不作至晚發熱脈澀數以血入氣中故也治之用桃仁承氣湯加紅花煎服下汙血數次即再用木香和中丸加丁香服之漸愈按此非審症精確者不可妄用噦而心下堅痞眩悸者膈間有痰水所謂虛不禁吐者二陳湯導痰飲加薑汁竹瀝水寒相搏者小青龍湯寒甚加附子尖亦妙本事方用枳殼五分木香二錢五分研細每服一錢白湯下孫兆方用陳皮二兩去白水煎通口服或枳殼一兩此皆破氣之劑氣逆宜之陳皮竹茹湯氣逆而虛者宜之無病偶然致厄此緣氣逆而生重者或經一二日宜小半夏茯苓湯加枳實或煎半夏湯泡蘿蔔子研取汁調木香調氣散白蔻仁丁香檀香木香各二兩藿香葉炙草各八兩砂仁四兩每服二錢入鹽少許乘熱服胃中寒甚或厄逆不已或服嘔吐輕劑不能取效宜丁香煮散治胃反嘔吐厄逆泄瀉丁香三十七粒生薑切片蓮肉二十七粒黃秫米半合水一碗半煮熟去姜啜粥及附子粳米湯增川椒丁香二三十粒治厄逆於關元灸七壯立愈靈樞雜病篇末云噦以草刺鼻取嚏嚏而已無息而疾迎之立已大驚之亦可已大補陰丸降陰火益腎水黃柏鹽炒知母酒炒各四兩熟地酒洗焙龜板炙各六兩豬脊髓加煉蜜丸桐子大每服十丸空心姜鹽湯下大補丸治腎經火燥下焦濕熱黃柏酒炒褐色為末水丸隨症用藥送下宣明桂苓白朮散消痰止厄逆散痞塞開堅結痛悶進飲食和臟腑官桂乾薑各二錢茯苓半夏各一兩白朮橘紅澤瀉各五錢共為末麵糊丸小豆大薑湯下日三服一方加黃連五錢黃柏二兩水丸效尤速皂莢半夏丸治厄逆欲死半夏一兩皂莢去皮炙酥八錢為末蜜丸桐子大每服三丸棗湯吞下日三夜一羌活散治厄逆羌活附子炮茴香各五錢木香良薑炮一錢為末每服二錢水一盞鹽一撮煎服良方丁香白蔻仁各五分伏龍肝一兩為末煎桃仁吳萸湯每服一錢調送下噫氣噫氣即今所謂噯氣是也內經論噫專主心脾二經立論準繩云噫者是火土之氣鬱而不得發故噫王注噫為心之義象火炎上隨咽焰出如膈閉痰間中氣不得伸而噫者亦土氣內郁也仲景云痞而噫旋覆代赭湯主之心下蓄結痞悶或多作噫敗卵氣枳殼散主之枳殼白朮各五錢香附一兩檳榔二錢共為細末每服二錢米飲調下日三服丹溪云胃中有實火膈上有調痰故成噫用二陳湯加香附梔子黃連蘇子前胡青黛或煎或丸服之𩞄雜𩞄雜者似飢而甚有懊憹不自安之意有胃熱火動其痰者有熱鬱滯為濕熱者有氣鬱氣滯者亦有瘀血所致者昏眩𩞄雜乃火動其痰也二陳加薑汁炒芩連石膏噫氣吞酸乃食鬱為熱也平胃散加枳桔因思慮傷而𩞄雜者茯苓補心湯元氣胃氣脾氣不足而𩞄雜者六君子倍山藥如以火治之必變吞酸中滿之症三聖丸治𩞄雜神效白朮四兩黃連橘紅各一兩神麯打糊為丸當歸補神湯亦治血虛𩞄雜八珍湯加麥冬山梔陳皮烏梅辰砂元米準繩云心下𩞄雜導飲丸最妙吳萸三錢茯苓一兩黃連五錢茅朮一兩獨活七錢為細末神麯糊丸元珠云有濕熱鬱滯不欲食者宜三補丸黃芩黃連黃柏蒸餅糊丸服加茅朮倍香附咳嗽傷風暴咳鼻塞身重涕唾稠黏數語未竟而咳寧嗽化痰湯枳殼桔梗茯苓各一錢紫蘇七分半夏陳皮前胡乾葛各一錢麻黃杏仁桑皮各一錢甘草四分姜三片春夏去麻黃桑皮加人參名參蘇飲治時行咳嗽如惡寒自汗發熱脈浮者宜桂枝湯加防風杏仁前胡細辛感寒咳嗽惡寒發熱鼻流清涕其脈浮緊者金沸草散旋覆花麻黃各七分荊芥穗一錢前胡七分甘草半夏赤芍各五分姜三片棗合寧嗽湯參酌用之冬日風寒外感形氣病氣俱實者宜華蓋散麻黃蘇子杏仁桑皮茯苓橘紅甘草風寒鬱熱於肺夜咳者宜三拗湯加知母風入肺久咳者鵝管石雄黃鬱金款冬花為末和勻置薑片上仍以薑片入茶壺中以蓋蓋之留嘴出煙吸烟入喉中凡人易於感冒治當解表之中兼實肺氣又肺有火則腠理不密風邪易入治宜解表清肺火如數行解表重亡津液為變甚大故凡肺受邪不能轉輸小便短少皮膚漸腫咳嗽日增者宜六君子湯以補脾肺六味丸以滋腎水易簡杏仁湯不問外感風寒內傷生冷及虛勞咯血痰飲停積皆治之人參半夏茯苓細辛乾薑甘草桂枝五味白芍杏仁按形寒飲冷則傷肺此內外合邪也此方兼而治之本方去人參杏仁加麻黃即小青龍湯能治久年痰飲喘嗽氣急亦治冬日咳而發寒熱者濟生橘蘇飲治傷風咳嗽身熱有汗惡風脈浮數有熱服杏子湯橘紅蘇葉杏仁五味白朮半夏桑皮川貝甘草暑熱夏月喘急而嗽面赤潮熱其脈浮洪大者黃連解毒湯黃連黃芩黃柏梔子加麥冬花粉桔梗桑皮咳而身熱自汗口乾便赤脈虛而洪者白虎湯兼天水五苓之屬身熱而煩氣高而喘心下痞悶四肢困倦精神短少者生脈散或清暑益氣湯黃耆人參蒼朮陳皮神麯白朮澤瀉炙草黃柏葛根青皮當歸五味子麥冬火嗽者有聲痰少面赤是也加減瀉白散桑皮陳皮地骨皮知母青皮桔梗淡芩如咽喉干痛鼻出熱氣咳喘上壅甚則風嘶咯血其痰咳而難出者色黃且濃此火熱乘肺也清肺化痰湯山梔淡芩知貝母麥冬桑皮桔梗茯苓橘紅栝蔞仁甘草或加黃連衍義治一婦人患肺熱咳身如炙肌瘦將成癆以枇杷葉木通款冬紫菀杏仁桑皮等分大黃減半蜜丸櫻桃大食後夜服各噙化一丸慎齊治一婦惱怒後身熱咳嗽吐血痰臭氣難聞胸膈飽悶背脹此火鬱宜發之紫菀葛根桔梗前胡枳殼半夏杏仁五味白芍甘草薏仁姜一服即愈上半日多嗽胃中有火川貝石膏降胃火午後嗽者屬陰虛四物加知母之屬或六味地黃湯亦妙黃昏嗽者火氣浮於肺不宜正用涼藥宜五味五倍斂而降之五更嗽此胃中有食積至此時火氣流入肺知母地骨皮降肺火濕傷之咳身重脈濡細痰稠自汗二陳二術之屬如喘滿浮腫宜款氣丸青陳皮檳榔木香杏仁當歸廣朮馬兜鈴葶藶各三錢人參五錢防己五錢牽牛一兩五錢薑汁丸每服二十丸濕咳多因乘熱入水或冒雨露或浴後不解濕衣致身體重痛而咳宜白朮酒炒白朮一兩酒三杯不拘時頻服不能飲酒以水代之燥傷肺之咳痰黏氣逆血腥杏仁蘿蔔子丸二味粥丸白湯下五十丸或清金潤燥天門冬丸治肺臟蘊熱咳嗽痰吐稠黏天門冬一兩五錢百合前胡貝母半夏桔梗桑白皮防己茯苓紫菀生地黃杏仁各七錢五分共為末蜜和打二三百杵丸如桐子大每服二十丸不拘時服生薑下日三服又方去防己前胡桑皮茯苓如麥冬人參肉桂阿膠陳皮甘草各三兩元米粉黃臘一兩成粥更入蜜再熬和勻丸加櫻桃大每服一丸用生薑細嚼下治肺經內外合邪咳嗽語聲不出咽喉妨礙狀加梅核噎塞不通噎食皆可服又方單用天冬十兩生地三斤取汁為膠麥冬膠八兩為丸如桐子大每服五十丸逍遙散下逍遙散須加人參甘草治婦人嗽喘手足煩熱骨蒸寢汗口乾引飲面目浮腫鳳髓湯為潤肺之要藥牛髓一斤白蜜半斤杏仁四兩山藥四兩胡桃四兩先將髓蜜砂鍋熬煬去渣盛瓷瓶內將杏仁等三味入瓶以紙密封瓶口重湯煮一日夜取出冷定每晨白湯化三匙下如面目浮腫蜜酥煎白蜜一升杏仁三升牛酥一升將杏仁於瓷盆內用水研取汁五升淨銅鍋內勿令油膩先加三升汁於鍋內日三次以溫酒調一匙米飲白湯皆可此方兼治虛損去風燥光皮膚按肺金之燥由咳最多然其所因又非一定或因汗下太多而津越於外或因瀉利太久而陰亡於下或營血衰少不養於經或精髓耗極不充於骨乃致肺金日就乾燥咳無止息此時急生其津急養其血補其精水猶可為也如不加察籠統殆矣膈上支飲最為咳嗽根底蓋膈上為陽氣所治心肺所居支飲橫處其中動肺則咳逆倚息不得臥小青龍湯主之按小青龍湯治支飲之要藥然須防其沖氣上逆蓋腎氣素虛之人衝任之火易於逆上此火上逆無咳且增煩咳況久咳乎此方仍恐動其沖氣復用桂苓五味甘草湯服湯沖氣即低而反更咳胸滿者水在腸間不散再變前方去桂加乾薑細辛可也蘆吸散治冷哮寒嗽喘促痰清但肺熱禁用款冬花川貝肉桂炙草各三錢鵝管石煅二錢鵝管石即鐘乳石之最精者為末以蘆管吸少許噙化咽之日三五次此即宣明焚香透膈散之變法彼用雄黃佛手此用桂心川貝甘草彼取無形之氣以散肺中之伏寒此用有形之散以搜肺絡之伏飲藥雖相類而用法原殊總取款冬鍾乳之溫肺利竅也本事鱉甲丸治虛咳嗽耳鳴眼花五味子二十四兩鱉甲地骨皮各三十兩蜜丸空心食前鹽湯下四錢婦人醋湯下葶藶散治咳嗽面目浮腫不得安臥涕吐稠黏甜葶藶隔紙炒郁李仁桑皮各一兩紫菀檳榔旋覆花木通各七錢大腹皮三錢五分每服三錢姜半分煎服機要款氣丸治咳久痰喘肺氣浮腫無廣朮有澤瀉每服二十丸白湯下天門冬丸治咯血吐血能潤肺止咳天門冬一兩杏仁七錢茯苓七錢阿膠五錢蜜丸彈子大日夜噙化三五丸久嗽乃積痰留肺脘黏滯如膠氣不升降或挾濕與酒而作蜂房殭蠶炒香附童便浸海蛤粉栝蔞仁杏仁竹瀝薑汁神麯各等分蜜調噙化下夢遺按夢遺之症其因有四有用心過度心氣空虛不能攝腎而遺者有淫欲邪思動其君火以致相火不寧搏激真水而遺者有色欲過度下元虛憊滑泄不禁而遺者有年壯氣盛久無色欲精氣溢而遺出者為證不同治法亦異用心過度者當安其神宜遠志棗仁茯神龍齒山藥蓮肉歸身人參丹參麥冬之屬培補心氣或苓朮菟絲子丸之類固之淫欲邪思者當清其心宜妙香散遠志丸天王補心丹生地麥冬川連黃柏之屬在所必用色欲過度者當固其真宜六味丸加鹿茸牡蠣蓯蓉菟絲子五味子龍骨茯苓菟絲丸治脾腎虛損不能收攝以致夢遺精滑困倦等症白茯苓白朮米泔浸蓮肉各四兩五味子酒煎二兩山藥二兩杜仲酒煎三兩炙草七錢菟絲子十一兩用潔水淘淨入陳酒浸一日文火煮爛極打為餅焙乾為末上藥用山藥末以陳酒煮糊丸如桐子大空心滾白湯服一百餘丸如氣虛神倦不能收攝者加人參三四兩尤妙辰砂妙香散治心脾不足恍惚不睡盜汗遺泄衄血溺血炙草桔梗山藥遠志甘草湯泡去骨茯苓神各一兩黃耆蜜炙人參各二兩木香二錢半辰砂三錢麝香一錢上十一味為散每服二錢不拘時溫酒調服祕旨無木香有砂仁三錢本方去黃耆桔梗山藥王荊公妙香散安神閉精定心氣龍骨益智人參各一兩茯苓神遠志各七錢硃砂炙草各七錢為末每服二錢空心溫酒調服遠志丸茯苓神人參龍齒各二兩遠志石菖蒲各一兩蜜丸桐子大以辰砂為衣每服七十丸空心熱湯下又空心熱薑湯下天王補心丹寧心保神蓋血固精壯力強志令人不忘除怔忡定驚悸清三焦化痰涎去煩熱療咽乾養心神人參當歸酒浸五味麥冬柏子仁酸棗仁各一兩白茯苓一兩天冬一兩丹元參桔梗各七錢遠志七錢生地四兩黃連二兩酒炒為末蜜丸桐子大辰砂為衣每服二三十丸臨臥時燈草竹葉煎湯下一方多石菖蒲熟地黃杜仲百部茯神甘草六味小便癃閉小便癃閉當辨虛實新久氣血異治大抵屬熱者多丹溪六法有熱有濕有氣結於下宜清宜燥宜升有隔二隔三之治其滋陰瀉膀胱此正治也清肺生水此隔二之治燥脾健胃此隔三之治又分氣虛血實痰氣閉塞皆宜吐之以提其氣氣升則水自降蓋氣承載其水者也皆用本證藥先服後吐如氣虛用參朮升麻之類東垣云小便不通皆邪熱為病分在氣與血而治之以渴與不渴而辨之如渴而不利者乃熱在上焦氣分不渴而至小便不利熱在下焦血分也熱在上焦當用淡味滲泄之藥而清其化源如茯苓車前琥珀燈心之類是也熱閉下焦當滋其陰滋腎丸之類是也經云三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣蓋上焦者肺也主行營衛通調水道下輸膀胱中焦者脾也內經云脾病則九竅不通小便不利下焦屬腎腎與膀胱相表裡也由是言之三焦所傷之邪不一氣之變化無窮故當隨處治邪行水求其氣化亦無窮也大要在乎陰與陽無相偏負然後氣得以化若方盛衰論曰至陰虛天氣絶至陽盛地氣不足夫腎肝在下地道也心肺在上天道也脾胃居中氣交之分其在上之陽不交於陰則在下之陰無以為化而水道其能出乎啓元子無陽陰無以生無陰則陽無以化東垣之用滋腎丸存陰之藥是滋其陰以化其陽之義也香參散治脾虛脹滿人參一兩沉香二錢五分新瓦上焙為細末每服四錢水煎服滋腎丸知母黃柏肉桂又名通關丸
